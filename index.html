<style>

#muteBtn{position:fixed;top:6px;right:120px;z-index:100;font-family:'Press Start 2P',monospace;font-size:6px;background:rgba(0,0,0,.75);color:#ffaa00;border:1px solid #ffaa0066;padding:4px 7px;cursor:pointer;transition:all .15s;text-shadow:0 0 6px #ffaa00;backdrop-filter:blur(4px)}

.actionBtn.pressed{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.7);color:#fff;box-shadow:0 0 12px rgba(255,255,255,.3)}

  const hud=document.getElementById('hud');

  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  hud.style.width=cw+'px';
  hud.style.fontSize=Math.round(Math.max(10,14*s))+'px';
  hud.style.padding=Math.round(12*s)+'px '+Math.round(14*s)+'px '+Math.round(6*s)+'px';
}

// ── ITEMS ──────────────────────────────────────────────────
const PRISON_ITEMS=[

  {name:'BIRTHDAY CAKE',emoji:'🎂'},{name:'RUBBER DUCK',emoji:'🐥'},

const SLIME_ITEMS=[

  {name:'OOZE CANISTER',emoji:'🫧'},{name:'BLOB EGG',emoji:'🥚'},
  {name:'TOXIC PUDDING',emoji:'🍮'},{name:'GLOW GOO',emoji:'💚'},
  {name:'SLIME MOLD',emoji:'🟢'},{name:'MYSTERY SLIME',emoji:'❓'},

function pickItem(){const p=slimeMode?SLIME_ITEMS:PRISON_ITEMS;return p[Math.min(level-1,p.length-1)];}

// ── CONSTANTS ──────────────────────────────────────────────
const FLOOR=310;
const GRAVITY=0.24,FALL_GRAVITY=0.37;
const JUMP_V=-6.3,SHORT_JUMP_V=-3.8,MAX_JUMP_FRAMES=10,JUMP_BOOST=0.30;

// ── LEVEL CONFIG — 10 levels ───────────────────────────────
function getLevelConfig(lv){
  // lv = 1..10
  const t=(lv-1)/9; // 0..1 progression
  return {
    length:        2800+lv*700,
    guardCount:    4+lv*3,
    turretCount:   2+Math.floor(lv*1.0),
    platformCount: 10+lv*3,
    hidespotCount: Math.max(7, 12-Math.floor(lv/2)),
    guardSpeed:    0.38+t*0.52,
    turretChargeMax: Math.max(40, 80-lv*4),
    turretBurst:   2+Math.floor(lv*0.3),
    bulletSpeed:   3+t*1.5,
    guardShootCD:  Math.max(90, 140-lv*3),
    visionRange:   160+lv*16,
    shootingGuardRatio: lv<3?0.33:lv<6?0.5:0.66,
    hasShooters:   lv>=2,
  };
}

// ── INPUT ──────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  resumeAudio();
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(state==='title'&&(e.code==='Space'||e.code==='Enter'))startGame();
  if((state==='dead'||state==='win'||(state==='win_cutscene'&&winCutsceneT>480))&&(e.code==='Space'||e.code==='Enter')){
    if(state==='dead'){state='title';startTitleMusic();return;}
    if(state==='win_cutscene'){stopWinMusic();level=1;lives=3;score=0;state='title';startTitleMusic();return;}
    if(state==='win'){level=1;lives=3;score=0;}
    startLevel();
  }
  // Tongue fire — Z key or X key
  if(state==='playing'&&(e.code==='KeyZ'||e.code==='KeyX')&&tongue.phase==='idle'&&tongue.cd<=0){
    fireTongue();
  }
  // Skip level — Tab key disabled
  if(e.code==='Tab')e.preventDefault();
  // Lick minigame
  if(state==='lickgame'&&(e.code==='Space'||e.code==='KeyZ'||e.code==='KeyX')){
    lickTap();e.preventDefault();
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── MOUSE CONTROLS ─────────────────────────────────────────
document.addEventListener('mousedown',e=>{
  if(e.button===0)keys['MouseJump']=true;
  if(e.button===2)keys['MouseLick']=true;
  if(state==='lickgame')lickTap();
});
document.addEventListener('mouseup',e=>{
  if(e.button===0)keys['MouseJump']=false;
  if(e.button===2)keys['MouseLick']=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
// Skip button disabled — click handler removed

// ── MOBILE CONTROLS ────────────────────────────────────────
(function(){
  const isTouchDevice=()=>window.matchMedia('(pointer:coarse)').matches||navigator.maxTouchPoints>0;
  const lc=document.getElementById('stickLeft');
  const lctx=lc.getContext('2d');
  const btnJump=document.getElementById('btnJump');
  const btnDuck=document.getElementById('btnDuck');
  const R=44,KR=20,CX=55,CY=55;
  const stick={dx:0,dy:0,active:false,tid:null};
  const DEAD=0.28;
  window.jumpBtn={held:false,tid:null};
  window.duckBtn={held:false,tid:null};

  function getAcc(){return slimeMode?'#7fff00':'#ffdd00';}
  function drawStick(){
    const acc=getAcc();
    lctx.clearRect(0,0,110,110);
    lctx.beginPath();lctx.arc(CX,CY,R,0,Math.PI*2);
    lctx.strokeStyle=acc+'44';lctx.lineWidth=2;lctx.stroke();
    lctx.fillStyle='rgba(0,0,0,0.3)';lctx.fill();
    // Inner ring
    lctx.beginPath();lctx.arc(CX,CY,R-8,0,Math.PI*2);
    lctx.strokeStyle=acc+'22';lctx.lineWidth=1;lctx.stroke();
    const kx=CX+stick.dx*R,ky=CY+stick.dy*R;
    const kg=lctx.createRadialGradient(kx-4,ky-5,2,kx,ky,KR);
    kg.addColorStop(0,acc+'ee');kg.addColorStop(0.6,acc+'88');kg.addColorStop(1,acc+'22');
    lctx.beginPath();lctx.arc(kx,ky,KR,0,Math.PI*2);
    lctx.fillStyle=kg;lctx.fill();
    lctx.strokeStyle=acc+'66';lctx.lineWidth=1.5;lctx.stroke();
    // Shine
    lctx.beginPath();lctx.arc(kx-5,ky-5,6,0,Math.PI*2);
    lctx.fillStyle='rgba(255,255,255,0.15)';lctx.fill();
  }
  function applyAll(){
    drawStick();
    keys['ArrowLeft']=stick.active&&stick.dx<-DEAD;
    keys['ArrowRight']=stick.active&&stick.dx>DEAD;
    keys['ArrowDown']=window.duckBtn.held||(stick.active&&stick.dy>DEAD);
    keys['ArrowUp']=window.jumpBtn.held||(stick.active&&stick.dy<-DEAD);
  }
  function stickXY(t){
    const r=lc.getBoundingClientRect();
    const sx=lc.width/r.width,sy=lc.height/r.height;
    const dx=(t.clientX-r.left)*sx-CX,dy=(t.clientY-r.top)*sy-CY;
    const d=Math.sqrt(dx*dx+dy*dy),cl=Math.min(d,R),a=Math.atan2(dy,dx);
    return{dx:Math.cos(a)*cl/R,dy:Math.sin(a)*cl/R};
  }
  function advance(){
    if(state==='title')startGame();
    else if(state==='dead'){state='title';startTitleMusic();return;}
    else if(state==='win_cutscene'&&winCutsceneT>480){stopWinMusic();level=1;lives=3;score=0;state='title';startTitleMusic();}
    else if(state==='win'){level=1;lives=3;score=0;startLevel();}
  }
  lc.addEventListener('touchstart',e=>{
    e.preventDefault();resumeAudio();
    for(const t of e.changedTouches)if(!stick.active){const p=stickXY(t);stick.dx=p.dx;stick.dy=p.dy;stick.active=true;stick.tid=t.identifier;advance();}
    applyAll();
  },{passive:false});
  lc.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches)if(t.identifier===stick.tid){const p=stickXY(t);stick.dx=p.dx;stick.dy=p.dy;}
    applyAll();
  },{passive:false});
  function stickEnd(e){e.preventDefault();for(const t of e.changedTouches)if(t.identifier===stick.tid){stick.dx=0;stick.dy=0;stick.active=false;stick.tid=null;}applyAll();}
  lc.addEventListener('touchend',stickEnd,{passive:false});lc.addEventListener('touchcancel',stickEnd,{passive:false});

  function mkBtn(btn,obj){
    btn.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)if(!obj.held){obj.held=true;obj.tid=t.identifier;btn.classList.add('pressed');advance();}applyAll();},{passive:false});
    function end(e){e.preventDefault();for(const t of e.changedTouches)if(t.identifier===obj.tid){obj.held=false;obj.tid=null;btn.classList.remove('pressed');}applyAll();}
    btn.addEventListener('touchend',end,{passive:false});btn.addEventListener('touchcancel',end,{passive:false});
  }
  mkBtn(btnJump,window.jumpBtn);mkBtn(btnDuck,window.duckBtn);
  // Lick button — fires tongue or taps in minigame
  const btnLick=document.getElementById('btnLick');
  window.lickBtn={held:false,tid:null};
  btnLick.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches)if(!window.lickBtn.held){
      window.lickBtn.held=true;window.lickBtn.tid=t.identifier;
      btnLick.classList.add('pressed');
      if(state==='playing'&&tongue.phase==='idle'&&tongue.cd<=0)fireTongue();
      if(state==='lickgame')lickTap();
    }
  },{passive:false});
  function lickBtnEnd(e){e.preventDefault();for(const t of e.changedTouches)if(t.identifier===window.lickBtn.tid){window.lickBtn.held=false;window.lickBtn.tid=null;btnLick.classList.remove('pressed');}}
  btnLick.addEventListener('touchend',lickBtnEnd,{passive:false});
  btnLick.addEventListener('touchcancel',lickBtnEnd,{passive:false});

  window.applyMobileControls=applyAll;
  function showControls(){
    document.getElementById('stickBar').classList.add('visible');
    const h=document.getElementById('kbHint');if(h)h.style.display='none';
    fitCanvas();applyAll();
  }
  if(isTouchDevice())showControls();
  else{document.getElementById('kbHint').style.display='block';window.addEventListener('touchstart',showControls,{once:true});}
})();

// ── SOUND ENGINE (Web Audio API — 8-bit synth) ─────────────
let audioCtx=null, sfxGain=null, musicGain=null, masterGain=null;
let soundMuted=false, musicPlaying=false, musicOsc=null, musicTimer=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=0.4; masterGain.connect(audioCtx.destination);
  sfxGain=audioCtx.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(masterGain);
  musicGain=audioCtx.createGain(); musicGain.gain.value=0.18; musicGain.connect(masterGain);
}

function resumeAudio(){
  if(!audioCtx)initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  if((state==='title'||state==='dead')&&!titleMusicPlaying&&!soundMuted)startTitleMusic();
}

// Play a tone with given params: freq, duration(s), type, gainNode, volume, slide(end freq)
function playTone(freq,dur,type,dest,vol,slide){
  if(soundMuted||!audioCtx)return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(freq,t);
  if(slide)o.frequency.linearRampToValueAtTime(slide,t+dur);
  g.gain.setValueAtTime(vol!==undefined?vol:0.3,t);
  g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(g); g.connect(dest||sfxGain);
  o.start(t); o.stop(t+dur);
}

// Play noise burst (for hits/explosions)
function playNoise(dur,vol,dest){
  if(soundMuted||!audioCtx)return;
  const t=audioCtx.currentTime;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(vol||0.2,t);
  g.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(g); g.connect(dest||sfxGain);
  src.start(t); src.stop(t+dur);
}

  if(!musicPlaying||soundMuted||!audioCtx)return;
  const trk=LEVEL_TRACKS[Math.min(level-1,9)];
  const s=musicSeqStep%64;

  // Melody — square lead
  const mel=trk.mel[s];
  if(mel)playTone(mel,stepMs*1.6/1000,'square',musicGain,0.11);
  // Bass — triangle for warmth
  const bas=trk.bas[s];
  if(bas)playTone(bas,stepMs*1.4/1000,'triangle',musicGain,0.20);
  // Chord stabs — sawtooth pad
  const chd=trk.chd[s];
  if(chd&&chd.length)for(const f of chd)playTone(f,stepMs*2.8/1000,'sawtooth',musicGain,0.05);
  // Drums
  const drm=trk.drm[s];
  if(drm==='K')playTone(55,0.10,'triangle',musicGain,0.18,28);
  if(drm==='S'){playNoise(0.07,0.10,musicGain);playTone(200,0.04,'square',musicGain,0.05,100);}

  const delay=state==='respawn'?stepMs+(respawnT/360)*stepMs*8:stepMs;
  musicSeqTimer=setTimeout(stepMusic,delay);
}

function startTitleMusic(){
  if(titleMusicPlaying||soundMuted||!audioCtx)return;
  titleMusicPlaying=true;titleStep=0;
  stepTitleMusic();
}
function stopTitleMusic(){
  titleMusicPlaying=false;
  if(titleTimer){clearTimeout(titleTimer);titleTimer=null;}
}
function stepTitleMusic(){
  if(!titleMusicPlaying||soundMuted||!audioCtx)return;
  const s=titleStep%96;

  // Melody (square wave lead)
  const mel=TITLE_MELODY[s];
  if(mel)playTone(mel,TITLE_STEP_MS*1.8/1000,'square',musicGain,0.13);

  // Bass (triangle for fat 80s bass)
  const bass=TITLE_BASS[s];
  if(bass)playTone(bass,TITLE_STEP_MS*1.5/1000,'triangle',musicGain,0.22);

  // Chords (sawtooth pad — short stabs)
  const chord=TITLE_CHORDS[s];
  if(chord){
    for(const f of chord)playTone(f,TITLE_STEP_MS*3/1000,'sawtooth',musicGain,0.06);
  }

  // Drums
  const drum=TITLE_DRUMS[s];
  if(drum==='K')playTone(55,0.1,'triangle',musicGain,0.2,30);      // kick
  if(drum==='S'){playNoise(0.07,0.12,musicGain);playTone(200,0.04,'square',musicGain,0.06,100);} // snare
  if(drum==='H')playNoise(0.02,0.05,musicGain);                     // hat

  // 80s shimmer arpeggios
  if(TITLE_ARP_STEPS.has(s)){
    TITLE_ARP_NOTES.forEach((f,i)=>{
      setTimeout(()=>{
        if(titleMusicPlaying&&!soundMuted&&audioCtx)playTone(f,0.06,'square',musicGain,0.04);
      },i*25);
    });
  }

  titleStep++;
  titleTimer=setTimeout(stepTitleMusic,TITLE_STEP_MS);
}

function toggleMute(){
  soundMuted=!soundMuted;
  if(soundMuted){stopMusic();stopTitleMusic();}
  else{
    if(state==='playing'||state==='lickgame')startMusic();
    if(state==='title'||state==='dead')startTitleMusic();
  }
  const mb=document.getElementById('muteBtn');
  mb.textContent=soundMuted?'🔇 MUTED':'🔊 SOUND';
}

// ── HELPERS ────────────────────────────────────────────────
function rand(a,b){return a+Math.random()*(b-a);}
function overlaps(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// Pixel text with drop shadow + optional glow
function pxt(txt,x,y,sz,col,align,glow){
  sz=sz||8;col=col||'#ffdd00';align=align||'left';
  ctx.save();
  ctx.font=sz+'px "Press Start 2P"';
  ctx.textAlign=align;ctx.textBaseline='top';
  if(glow){ctx.shadowColor=glow;ctx.shadowBlur=10;}
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillText(txt,x+2,y+2);
  ctx.shadowBlur=0;
  if(glow){ctx.shadowColor=glow;ctx.shadowBlur=8;}
  ctx.fillStyle=col;ctx.fillText(txt,x,y);
  ctx.restore();
}

function spawnParticles(x,y,color,n,opts){
  n=n||8;opts=opts||{};
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=rand(opts.sMin||1.5,opts.sMax||4.5);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(opts.yBias||2),
      life:opts.life||35,max:opts.life||35,color,size:rand(opts.sz||3,opts.szMax||7)});
  }
}

// ── BUILD LEVEL ────────────────────────────────────────────
function buildLevel(){
  levelCfg=getLevelConfig(level);
  palette=LEVEL_PALETTES[Math.min(level-1,9)];
  item=pickItem();
  levelWidth=levelCfg.length;
  goalX=levelWidth-280;
  worldX=0;caughtFlash=0;clearTimer=0;frameCount=0;
  bullets=[];particles=[];alertBubbles=[];
  guardsEverPuddled=new Set();turretsEverPuddled=new Set();levelBonuses={};

  player={
    x:100,y:FLOOR-32,w:22,h:32,
    vx:0,vy:0,onGround:false,ducking:false,hidden:false,
    facing:1,blinkT:0,walkT:0,jumpHeld:false,jumpFrames:0,
    invincible:0,  // frames of invincibility remaining after thong absorbs a hit
    hasThong:false,  // wearing thong on head
  };

  // Platforms — tier-chained so every platform is reachable from its neighbors,
  // every platform has at least one neighbour within jump range, and every
  // platform is accessible from the ground at some point along the level.
  // Max held-jump range: ~172 px horizontal, ~175 px vertical.
  // Tiers are 58 px apart so ±1 tier between neighbours is always jumpable.
  // Tiers 0 (96px) and 1 (154px) are within jump height from the floor.
  platforms=[];
  const np=levelCfg.platformCount;
  const sp=(levelWidth-500)/np;
  const TIER_Y=[FLOOR-96,FLOOR-154,FLOOR-212,FLOOR-265];
  const MAX_EDGE_GAP=140; // safe horizontal jump limit (px, edge-to-edge)
  let curTier=Math.floor(Math.random()*2); // start on tier 0 or 1
  for(let i=0;i<np;i++){
    const px=380+i*sp+rand(-sp*.08,sp*.08); // tighter jitter prevents big gaps
    const minT=Math.max(0,curTier-1);
    const maxT=Math.min(3,curTier+1);
    curTier=minT+Math.floor(Math.random()*(maxT-minT+1));
    const pw=rand(80,curTier===0?160:130);
    platforms.push({x:px,y:TIER_Y[curTier],w:pw,h:12});
  }
  platforms.sort((a,b)=>a.x-b.x);
  // Bridge pass: insert a stepping-stone wherever the horizontal gap is too large
  for(let i=1;i<platforms.length;i++){
    const prev=platforms[i-1],cur=platforms[i];
    const gap=cur.x-(prev.x+prev.w);
    if(gap>MAX_EDGE_GAP){
      const prevT=TIER_Y.indexOf(prev.y), curT=TIER_Y.indexOf(cur.y);
      const bridgeT=Math.round((prevT+curT)/2);
      const bridgeX=prev.x+prev.w+Math.floor(gap/2)-45;
      platforms.splice(i,0,{x:bridgeX,y:TIER_Y[bridgeT],w:90,h:12});
      i++; // skip past the bridge we just inserted
    }
  }
  // No platforms within one jump-reach of the finish line — player must cross on the ground
  platforms=platforms.filter(p=>p.x+p.w<=goalX-MAX_EDGE_GAP);

  // Second bridge pass — filter may have removed a platform and opened a gap
  for(let i=1;i<platforms.length;i++){
    const prev=platforms[i-1],cur=platforms[i];
    const gap=cur.x-(prev.x+prev.w);
    if(gap>MAX_EDGE_GAP){
      const prevT=TIER_Y.indexOf(prev.y),curT=TIER_Y.indexOf(cur.y);
      const bridgeT=Math.round((prevT+curT)/2);
      const bridgeX=prev.x+prev.w+Math.floor(gap/2)-45;
      platforms.splice(i,0,{x:bridgeX,y:TIER_Y[bridgeT],w:90,h:12});
      i++;
    }
  }

  // Ground-entry pass — every platform must be accessible from the ground.
  // TIER_Y[0] (96px) and TIER_Y[1] (154px) are both within the ~175px jump height,
  // so they count as "ground accessible". Any stretch > 350px with only tier 2/3
  // platforms would strand the player after a fall; insert a tier-1 stepping stone.
  {
    const inserts=[];
    let lastGroundX=0; // right edge of the most recent tier-0/1 platform seen
    for(const pl of platforms){
      if(pl.y>=TIER_Y[1]){lastGroundX=pl.x+pl.w;continue;} // tier 0 or 1
      if(pl.x-lastGroundX>350){
        // Add a tier-1 entry platform just before this high-tier platform
        const ex=Math.max(lastGroundX+20,pl.x-120);
        inserts.push({x:ex,y:TIER_Y[1],w:90,h:12});
        lastGroundX=ex+90;
      }
    }
    if(inserts.length){
      platforms.push(...inserts);
      platforms.sort((a,b)=>a.x-b.x);
      // Final bridge pass after insertions
      for(let i=1;i<platforms.length;i++){
        const prev=platforms[i-1],cur=platforms[i];
        const gap=cur.x-(prev.x+prev.w);
        if(gap>MAX_EDGE_GAP){
          const prevT=TIER_Y.indexOf(prev.y),curT=TIER_Y.indexOf(cur.y);
          const bridgeT=Math.round((prevT+curT)/2);
          const bridgeX=prev.x+prev.w+Math.floor(gap/2)-45;
          platforms.splice(i,0,{x:bridgeX,y:TIER_Y[bridgeT],w:90,h:12});
          i++;
        }
      }
    }
  }

  // Hidespots — fewer at higher levels
  hidespots=[];
  const nh=levelCfg.hidespotCount;
  const hsp=(levelWidth-300)/nh;
  for(let i=0;i<nh;i++){
    hidespots.push({x:250+i*hsp+rand(-40,40),y:FLOOR-42,w:38,h:42});
  }

  // Guards
  guards=[];
  const ng=levelCfg.guardCount;
  const gsp=(levelWidth-480)/ng;
  for(let i=0;i<ng;i++){
    const gx=380+i*gsp+rand(-gsp*.15,gsp*.15);
    const rng=100+level*18;
    let gy=FLOOR-38,platRef=null;
    if(i%3===2){
      const near=platforms.find(pl=>Math.abs(pl.x-gx)<180);
      if(near){gy=near.y-38;platRef=near;}
    }
    let pMin=platRef?platRef.x:gx-rng;
    let pMax=platRef?platRef.x+platRef.w-20:gx+rng;
    if(pMin>pMax){const tmp=pMin;pMin=pMax;pMax=tmp;} // swap if platform too narrow
    const sx=platRef?clamp(gx,pMin,pMax):gx;
    const shoots=levelCfg.hasShooters&&Math.random()<levelCfg.shootingGuardRatio;
    guards.push({
      x:sx,y:gy,w:20,h:38,
      dir:i%2===0?1:-1,
      speed:levelCfg.guardSpeed,
      patrol:{min:pMin,max:pMax,floor:platRef?platRef.y:FLOOR},
      platRef,state:'patrol',alertT:0,blinkT:0,walkT:0,
      shootCooldown:0,canShoot:shoots,
      hp:5,
    });
  }

  // Turrets — wall-mounted at varied heights on the brick walls
  turrets=[];
  const nt=levelCfg.turretCount;
  const tsp=(levelWidth-600)/nt;
  // Wall mount heights: low (near floor), mid, high (near ceiling)
  const wallHeights=[FLOOR-55, FLOOR-110, FLOOR-170, FLOOR-220];
  for(let i=0;i<nt;i++){
    const tx=480+i*tsp+rand(-tsp*.12,tsp*.12);
    const dir=i%2===0?1:-1;
    // Pick a wall height — vary by position so they're not all at the same level
    const heightIdx=(i*3+Math.floor(rand(0,2)))%wallHeights.length;
    const ty=wallHeights[heightIdx];
    turrets.push({
      x:tx,y:ty,w:26,h:24,dir,
      wallMount:true,
      state:'idle',detectRange:levelCfg.visionRange,
      chargeT:0,chargeMax:levelCfg.turretChargeMax,
      cooldownT:0,cooldownMax:90,
      burstLeft:0,burstCooldown:0,
      scanAngle:i*1.3,alertAlpha:0,pulseT:0,
    });
  }

  // Heart pickup — one per level, placed near the midpoint
  const hx=levelWidth/2+rand(-200,200);
  const hNear=platforms.find(pl=>Math.abs(pl.x+pl.w/2-hx)<200);
  const hy=hNear?hNear.y-18:FLOOR-18;
  heartPickup={x:hx,y:hy,w:14,h:14,collected:false,bobT:Math.random()*Math.PI*2};

  // Thong pickups — 2-3 per level, placed on platforms or floor
  thongPickups=[];
  const nThongs=2+Math.floor(Math.random()*2);
  const tpsp=(levelWidth-600)/nThongs;
  for(let i=0;i<nThongs;i++){
    const tx=400+i*tpsp+rand(-tpsp*.2,tpsp*.2);
    // Prefer placing on a platform
    const near=platforms.find(pl=>Math.abs(pl.x+pl.w/2-tx)<200);
    const ty=near?near.y-18:FLOOR-18;
    thongPickups.push({x:tx,y:ty,w:16,h:14,collected:false,bobT:Math.random()*Math.PI*2});
  }

  // Lickalotapus Coins — 2-4 coins on almost every platform, plus ground every ~220px
  coins=[];
  function mkCoin(x,y){coins.push({x,y,collected:false,bobT:Math.random()*Math.PI*2,spin:Math.random()*Math.PI*2});}
  for(const pl of platforms){
    if(Math.random()<0.12)continue; // skip ~1 in 8 platforms for variety
    const n=2+Math.floor(Math.random()*3); // 2-4 coins
    for(let i=0;i<n;i++) mkCoin(pl.x+6+(i*(pl.w-12)/Math.max(n-1,1)),pl.y-10);
  }
  // Ground coins every ~220px
  for(let gx=400;gx<levelWidth-300;gx+=200+rand(-30,30))mkCoin(gx,FLOOR-10);
  coinsTotal=coins.length;
  coinsCollected=0;

  updateHUD();
}

function startGame(){resumeAudio();stopTitleMusic();level=1;lives=3;score=0;state='cutscene';cutsceneT=0;SFX.menuSelect();}
function startLevel(){lives=Math.max(lives,3);state='playing';buildLevel();startMusic();}

function updateHUD(){
  document.getElementById('hLives').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('hItem').textContent=item?item.emoji+' '+item.name:'';
  document.getElementById('hCoins').textContent=coinsTotal>0?'🪙 '+coinsCollected+'/'+coinsTotal:'';
  document.getElementById('hScore').textContent=score.toString().padStart(7,'0');
}

// ── UPDATE ─────────────────────────────────────────────────
function update(){
  if(state==='conjugal_cutscene'){
    conjugalCutsceneT++;
    if(conjugalCutsceneT>=conjugalCutsceneDur){state='lickgame';}
    return;
  }
  if(state==='lickgame'||state==='lickresult'){updateLickGame();return;}
  if(state==='respawn'){
    respawnT++;
    if(respawnT>=360){
      player.x=100;player.y=FLOOR-32;player.vx=0;player.vy=0;
      player.ducking=false;player.h=32;player.jumpHeld=false;player.jumpFrames=MAX_JUMP_FRAMES;
      worldX=0;caughtFlash=30;
      for(const g of guards){g.state='patrol';g.shootCooldown=30;g.alertT=0;}
      for(const t of turrets){if(t.state==='puddle')continue;t.state='idle';t.alertAlpha=0;t.chargeT=0;t.burstLeft=0;}
      bullets=[];alertBubbles=[];
      if(audioCtx&&musicGain){const _t=audioCtx.currentTime;musicGain.gain.cancelScheduledValues(_t);musicGain.gain.setValueAtTime(0.18,_t);}
      state='playing';
    }
    return;
  }
  if(state!=='playing')return;
  if(clearTimer>0){clearTimer--;return;}

  const p=player;
  const LEFT=keys['ArrowLeft']||keys['KeyA'];
  const RIGHT=keys['ArrowRight']||keys['KeyD'];
  const JUMP_KEY=keys['ArrowUp']||keys['KeyW']||keys['MouseJump'];
  const DUCK=keys['ArrowDown']||keys['KeyS']||keys['Space'];
  const LICK=keys['KeyZ']||keys['KeyX']||keys['MouseLick'];

  // Duck
  const wasDucking=p.ducking;
  p.ducking=DUCK&&p.onGround;
  if(p.ducking&&!wasDucking){p.h=18;p.y+=14;}
  if(!p.ducking&&wasDucking){p.h=32;p.y-=14;}

  // Tongue auto-fire while held
  if(LICK&&tongue.phase==='idle'&&tongue.cd<=0)fireTongue();

  // Move
  const spd=p.ducking?0.75:1.7;
  if(LEFT){p.vx=-spd;p.facing=-1;}
  else if(RIGHT){p.vx=spd;p.facing=1;}
  else{p.vx*=0.75;}
  if(!p.ducking&&(LEFT||RIGHT)){p.walkT++;if(p.onGround&&p.walkT%14===0)SFX.walk();}else if(p.onGround)p.walkT=0;

  // Short jump from crouch
  if(JUMP_KEY&&p.onGround&&p.ducking&&!p.jumpHeld){
    p.ducking=false;p.h=32;p.y-=14;
    p.vy=SHORT_JUMP_V;p.onGround=false;p.jumpHeld=true;p.jumpFrames=MAX_JUMP_FRAMES;SFX.jump();
  }
  // Variable jump
  if(JUMP_KEY&&p.onGround&&!p.ducking&&!p.jumpHeld){
    p.vy=JUMP_V;p.onGround=false;p.jumpHeld=true;p.jumpFrames=0;SFX.jump();
  }
  if(JUMP_KEY&&p.jumpHeld&&!p.onGround&&p.jumpFrames<MAX_JUMP_FRAMES){
    p.vy-=JUMP_BOOST;p.jumpFrames++;
  }
  if(!JUMP_KEY){p.jumpHeld=false;p.jumpFrames=MAX_JUMP_FRAMES;}

  // Gravity
  const grav=(p.vy>0||!JUMP_KEY)?FALL_GRAVITY:GRAVITY;
  p.vy+=grav;if(p.vy>16)p.vy=16;
  p.y+=p.vy;p.x+=p.vx;

  // Camera scroll — bidirectional
  const mid=W*.38;
  if(p.x>mid){worldX+=p.x-mid;p.x=mid;}
  else if(p.x<mid&&worldX>0){worldX+=p.x-mid;p.x=mid;}
  if(worldX<0){p.x-=worldX;worldX=0;}
  if(p.x<0)p.x=0;

  // Floor
  p.onGround=false;
  if(p.y+p.h>=FLOOR){p.y=FLOOR-p.h;p.vy=0;p.onGround=true;p.jumpHeld=false;p.jumpFrames=MAX_JUMP_FRAMES;}

  // Platforms
  for(const pl of platforms){
    const sx=pl.x-worldX;
    if(p.x+p.w>sx&&p.x<sx+pl.w&&p.vy>=0&&p.y+p.h>=pl.y&&p.y+p.h<=pl.y+16){
      p.y=pl.y-p.h;p.vy=0;p.onGround=true;p.jumpHeld=false;p.jumpFrames=MAX_JUMP_FRAMES;
    }
  }

  // Hidden?
  const wasHidden=p.hidden;
  p.hidden=false;
  for(const hs of hidespots){
    const sx=hs.x-worldX;
    if(p.ducking&&overlaps(p,{x:sx,y:hs.y,w:hs.w,h:hs.h})){p.hidden=true;break;}
  }
  if(p.hidden&&!wasHidden)SFX.hide();
  p.blinkT=(p.blinkT+1)%60;
  if(p.invincible>0)p.invincible--;

  // Guards
  for(const g of guards){
    if(g.state==='puddle')continue;
    g.blinkT=(g.blinkT+1)%60;
    if(g.shootCooldown>0)g.shootCooldown--;
    const gsx=g.x-worldX;
    const dist=Math.abs(p.x-(gsx+g.w/2));
    const sameFloor=Math.abs((p.y+p.h)-(g.y+g.h))<100;
    const facing=g.dir>0?(p.x>gsx):(p.x<gsx+g.w);
    const canSee=!godMode&&!p.hidden&&sameFloor&&facing&&dist<levelCfg.visionRange;

    if(canSee){
      if(g.state==='patrol'){g.state='alert';g.alertT=50;alertBubbles.push({wx:g.x,wy:g.y+g.h,t:65,max:65,text:'!'});SFX.alert();}
      else if(g.state==='alert'){g.alertT--;if(g.alertT<=0)g.state='chase';}
      else{
        const pWX=p.x+worldX;
        if(pWX>g.x+g.w/2)g.x+=g.speed*2.0;else g.x-=g.speed*2.0;
        g.dir=(pWX>g.x)?1:-1;
        g.x=clamp(g.x,g.patrol.min,g.patrol.max);
        g.walkT=(g.walkT||0)+1;
        alertBubbles.push({wx:g.x,wy:g.y+g.h,t:5,max:5,text:'!!'});
        if(g.canShoot&&g.shootCooldown<=0){
          const bspd=levelCfg.bulletSpeed;
          bullets.push({x:g.x+(g.dir>0?g.w:0),y:g.y+14,vx:g.dir*bspd,vy:0,w:8,h:4,life:120});
          g.shootCooldown=levelCfg.guardShootCD;SFX.shoot();
          spawnParticles(g.x-worldX+(g.dir>0?g.w+4:-4),g.y+14,T.bulletColor,4,{sMin:.5,sMax:2,life:15});
        }
      }
    } else {
      if(g.state!=='patrol'){alertBubbles.push({wx:g.x,wy:g.y+g.h,t:50,max:50,text:'?'});g.state='patrol';}
      g.x+=g.dir*g.speed;
      if(g.x>g.patrol.max){g.x=g.patrol.max;g.dir=-1;}
      if(g.x<g.patrol.min){g.x=g.patrol.min;g.dir=1;}
      g.walkT=(g.walkT||0)+1;
    }
    if(!godMode&&!p.hidden&&p.invincible<=0&&overlaps(p,{x:gsx,y:g.y,w:g.w,h:g.h})){doCaught();return;}
  }

  // Turrets
  for(const t of turrets){
    const tsx=t.x-worldX;
    const pCX=p.x+p.w/2,pCY=p.y+p.h/2;
    const tCX=tsx+t.w/2,tCY=t.y+t.h/2;
    const dx=pCX-tCX,dy=pCY-tCY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const inFront=t.dir>0?(dx>0):(dx<0);
    const detected=!p.hidden&&dist<t.detectRange&&inFront;
    t.scanAngle+=0.025;t.pulseT++;

    if(t.state==='idle'){
      t.alertAlpha=Math.max(0,t.alertAlpha-.04);
      if(detected){t.state='detecting';t.chargeT=0;}
    } else if(t.state==='detecting'){
      t.alertAlpha=Math.min(1,t.alertAlpha+.07);
      if(!detected)t.state='idle';
      else{t.chargeT++;if(t.chargeT>=t.chargeMax){t.state='charging';t.chargeT=0;}}
    } else if(t.state==='charging'){
      t.alertAlpha=1;t.chargeT++;
      if(t.chargeT>=20){t.state='firing';t.burstLeft=levelCfg.turretBurst;t.burstCooldown=0;}
    } else if(t.state==='firing'){
      t.burstCooldown--;
      if(t.burstCooldown<=0&&t.burstLeft>0){
        const angle=Math.atan2(dy,dx)+rand(-.1,.1);
        const spd=levelCfg.bulletSpeed;
        bullets.push({x:t.x+(t.dir>0?t.w+13:-12),y:t.y+t.h/2,
          vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,w:7,h:4,life:100,fromTurret:true});
        spawnParticles(t.x-worldX+(t.dir>0?t.w+4:-4),t.y+t.h/2,T.bulletColor,4,{sMin:.5,sMax:2,life:15});
        t.burstLeft--;t.burstCooldown=10;SFX.shoot();
      }
      if(t.burstLeft<=0&&t.burstCooldown<=0){t.state='cooldown';t.cooldownT=t.cooldownMax;}
    } else if(t.state==='cooldown'){
      t.alertAlpha=Math.max(0,t.alertAlpha-.025);t.cooldownT--;
      if(t.cooldownT<=0)t.state='idle';
      // Only allow re-detection once the stun window has elapsed;
      // tongue-stuns set cooldownT > cooldownMax so this blocks early re-trigger.
      if(detected&&t.cooldownT<=t.cooldownMax){t.state='detecting';t.chargeT=0;}
    }
  }

  // Bullets
  for(const b of bullets){
    b.x+=b.vx;b.vy+=0.1;b.y+=b.vy;b.life--;
    const bsx=b.x-worldX;
    if(!godMode&&!p.hidden&&p.invincible<=0&&overlaps(p,{x:bsx,y:b.y,w:b.w,h:b.h})){
      spawnParticles(p.x+p.w/2,p.y+p.h/2,'#ff4444',14);
      b.life=0;doCaught();return;
    }
  }
  bullets=bullets.filter(b=>b.life>0&&b.x-worldX>-60&&b.x-worldX<W+60);

  // ── Thong pickup collision ──
  if(!player.hasThong){
    for(const tp of thongPickups){
      if(!tp.collected&&overlaps(player,{x:tp.x-worldX,y:tp.y,w:tp.w,h:tp.h})){
        tp.collected=true;
        player.hasThong=true;
        spawnParticles(tp.x-worldX+8,tp.y,'#ff88cc',12,{sMin:2,sMax:5,yBias:3,life:30});SFX.pickup();
      }
    }
  }

  // ── Heart pickup collision ──
  if(heartPickup&&!heartPickup.collected&&overlaps(player,{x:heartPickup.x-worldX,y:heartPickup.y,w:heartPickup.w,h:heartPickup.h})){
    heartPickup.collected=true;
    lives=Math.min(lives+1,5);
    spawnParticles(heartPickup.x-worldX+7,heartPickup.y,'#ff4466',16,{sMin:2,sMax:5,yBias:3,life:35});
    SFX.extraLife();
    updateHUD();
  }

  // ── Coin collision ──
  for(const c of coins){
    if(c.collected)continue;
    if(overlaps(player,{x:c.x-worldX,y:c.y,w:10,h:10})){
      c.collected=true;
      coinsCollected++;
      score+=100;
      spawnParticles(c.x-worldX+5,c.y,'#ffd700',8,{sMin:1,sMax:3,yBias:2,life:22});
      SFX.coin();
      updateHUD();
    }
  }

  // Goal?
  const gsx=goalX-worldX;
  if(p.x+p.w>=gsx&&p.x<gsx+60)doLevelClear();

  // Particles
  for(const pt of particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life--;}
  particles=particles.filter(pt=>pt.life>0&&pt.x>-100&&pt.x<W+100);
  alertBubbles=alertBubbles.filter(b=>{b.t--;return b.t>0;});
  if(caughtFlash>0)caughtFlash--;
  updateTongue();
  updateHUD();
}

function doCaught(){
  if(player.hasThong){
    // Thong absorbs the hit — lose the thong but not a life
    player.hasThong=false;
    player.invincible=180; // ~3s grace period so player can clear the danger zone
    spawnParticles(player.x+player.w/2,player.y,'#ff88cc',28,{sMin:3,sMax:8,yBias:3,sz:3,szMax:8,life:50});
    SFX.thongShield();
    caughtFlash=40;
    return;
  }
  lives--;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff4444',20,{sMin:2,sMax:6,yBias:3,sz:4,szMax:9,life:45});
  bustIsGameOver=(lives<=0);
  state='bust_cutscene';bustCutsceneT=0;
  {const pool=slimeMode?(bustIsGameOver?BUST_TAUNTS.overSlime:BUST_TAUNTS.regSlime):(bustIsGameOver?BUST_TAUNTS.over:BUST_TAUNTS.reg);bustTaunt=pool[Math.floor(Math.random()*pool.length)];}
  if(bustIsGameOver){
    stopMusic();
    if(audioCtx&&musicGain){const _t=audioCtx.currentTime;musicGain.gain.cancelScheduledValues(_t);musicGain.gain.setValueAtTime(0.18,_t);}
    SFX.death();
  } else {
    SFX.caught();
    if(audioCtx&&musicGain&&musicPlaying){const _t=audioCtx.currentTime;musicGain.gain.cancelScheduledValues(_t);musicGain.gain.setValueAtTime(musicGain.gain.value,_t);musicGain.gain.linearRampToValueAtTime(0,_t+9);}
  }
  updateHUD();
}

function doLevelClear(){
  if(clearTimer>0)return;
  const pts=300+level*80;score+=pts;
  const bGuards=guardsEverPuddled.size===guards.length?1000:0;
  const bTurrets=turretsEverPuddled.size===turrets.length?1000:0;
  const bCoins=coinsTotal>0&&coinsCollected>=coinsTotal?500:0;
  levelBonuses={guards:bGuards,turrets:bTurrets,coins:bCoins};
  score+=bGuards+bTurrets+bCoins;
  spawnParticles(player.x+player.w/2,player.y,T.accent,28,{sMin:2,sMax:7,yBias:4,sz:4,szMax:10,life:55});
  clearTimer=9999;SFX.levelClear();stopMusic();
  // Staggered bonus award sounds
  setTimeout(()=>{if(bGuards)SFX.bonusAwarded();else SFX.bonusMissed();},800);
  setTimeout(()=>{if(bTurrets)SFX.bonusAwarded();else SFX.bonusMissed();},1200);
  setTimeout(()=>{if(bCoins)SFX.bonusAwarded();else SFX.bonusMissed();},1600);
  setTimeout(()=>{
    startLickGame(level+1);
  },2500);
}

// ── TONGUE WEAPON ─────────────────────────────────────────
function fireTongue(){
  if(tongue.phase!=='idle')return;
  tongue.phase='out';
  tongue.dir=player.facing;
  tongue.x=player.x+(player.facing>0?player.w:0);
  tongue.y=player.y+(player.ducking?8:14);
  tongue.len=0;
  tongue.maxLen=(55+level*4)*(player.hasThong?1.6:1);
  tongue.hitGuard=null;
  SFX.lick();
}

function updateTongue(){
  if(tongue.cd>0)tongue.cd--;
  if(tongue.phase==='idle')return;
  const speed=14;
  if(tongue.phase==='out'){
    tongue.len+=speed;
    if(tongue.len>=tongue.maxLen)tongue.phase='retract';
    // Check tongue tip vs guards & turrets
    const tipX=(player.x+(player.facing>0?player.w:0))+tongue.dir*tongue.len;
    const tipY=player.y+(player.ducking?8:14);
    for(const g of guards){
      const gsx=g.x-worldX;
      if(tipX>gsx&&tipX<gsx+g.w&&tipY>g.y&&tipY<g.y+g.h&&tongue.hitGuard!==g){
        tongue.hitGuard=g;
        if(player.hasThong||(g.hp||1)-1<=0){
          // Thong power or last hit — melt into puddle
          g.state='puddle';g.alertT=0;g.hp=0;guardsEverPuddled.add(g);
          spawnParticles(gsx+g.w/2,g.y+g.h/2,'#55ddff',28,{sMin:2,sMax:6,yBias:1,life:45});
          score+=200;updateHUD();SFX.lickHit();
        } else {
          // Stun guard, show remaining hp
          g.hp=(g.hp||1)-1;
          g.state='patrol';g.alertT=0;
          spawnParticles(gsx+g.w/2,g.y+g.h/2,'#ff6688',14,{sMin:2,sMax:5,yBias:3,life:30});
          score+=50;updateHUD();SFX.lickHit();
        }
        tongue.phase='retract';
      }
    }
    // Check tongue tip vs turrets
    for(const t of turrets){
      if(t.state==='puddle')continue;
      const tsx=t.x-worldX;
      if(tipX>tsx&&tipX<tsx+t.w&&tipY>t.y&&tipY<t.y+t.h){
        if(player.hasThong){
          // Thong power — destroy turret for the round
          t.state='puddle';t.chargeT=0;t.burstLeft=0;t.alertAlpha=0;turretsEverPuddled.add(t);
          spawnParticles(tsx+t.w/2,t.y+t.h/2,'#ffaa00',28,{sMin:2,sMax:7,yBias:1,life:45});
          score+=200;updateHUD();SFX.lickHit();
        } else {
          // Normal stun — long offline period; cooldownT > cooldownMax blocks re-detection
          t.state='cooldown';t.cooldownT=t.cooldownMax*5;t.chargeT=0;t.burstLeft=0;t.alertAlpha=0;
          spawnParticles(tsx+t.w/2,t.y+t.h/2,'#ffaa00',14,{sMin:2,sMax:5,yBias:2,life:30});
          score+=50;updateHUD();SFX.lickHit();
        }
        tongue.phase='retract';
      }
    }
    // Check tongue tip vs coins
    for(const c of coins){
      if(c.collected)continue;
      const cx=c.x-worldX;
      if(tipX>cx-6&&tipX<cx+16&&tipY>c.y-6&&tipY<c.y+16){
        c.collected=true;
        coinsCollected++;
        score+=100;
        spawnParticles(cx+5,c.y,'#ffd700',8,{sMin:1,sMax:3,yBias:2,life:22});
        SFX.coin();
        updateHUD();
      }
    }
    // Check tongue tip vs thong pickups
    if(!player.hasThong){
      for(const tp of thongPickups){
        if(tp.collected)continue;
        const tx=tp.x-worldX;
        if(tipX>tx-6&&tipX<tx+tp.w+6&&tipY>tp.y-6&&tipY<tp.y+tp.h+6){
          tp.collected=true;
          player.hasThong=true;
          spawnParticles(tx+8,tp.y,'#ff88cc',12,{sMin:2,sMax:5,yBias:3,life:30});
          SFX.pickup();
        }
      }
    }
    // Check tongue tip vs heart pickup
    if(heartPickup&&!heartPickup.collected){
      const hx=heartPickup.x-worldX;
      if(tipX>hx-6&&tipX<hx+heartPickup.w+6&&tipY>heartPickup.y-6&&tipY<heartPickup.y+heartPickup.h+6){
        heartPickup.collected=true;
        lives=Math.min(lives+1,5);
        spawnParticles(hx+7,heartPickup.y,'#ff4466',16,{sMin:2,sMax:5,yBias:3,life:35});
        SFX.extraLife();
        updateHUD();
      }
    }
  } else if(tongue.phase==='retract'){
    tongue.len-=speed*1.4;
    if(tongue.len<=0){tongue.len=0;tongue.phase='idle';tongue.cd=20;}
  }
}

// ── LICK MINIGAME ──────────────────────────────────────────
function startLickGame(nextLevel){
  lickGame.active=true;lickGame.count=0;lickGame.timeLeft=600; // 10s @ 60fps
  lickGame.pendingLevel=nextLevel;
  lickGame.lastScore=0;
  lickGame.thongOff=false;lickGame.thongFallT=0;lickGame.tongueFrame=99;
  if(nextLevel===6){wardenCutsceneT=0;state='warden_cutscene';return;}
  conjugalCutsceneT=0;
  state='conjugal_cutscene';
}

function lickTap(){
  if(state!=='lickgame')return;
  lickGame.count++;
  lickGame.tongueFrame=0;
  spawnParticles(W/2+Math.random()*60-30,H/2+20,'#ff6688',6,{sMin:2,sMax:5,yBias:4,life:20});
  SFX.lickTap();
}

function updateLickGame(){
  if(state!=='lickgame')return;
  lickGame.timeLeft--;
  if(lickGame.tongueFrame!==undefined) lickGame.tongueFrame++;
  // Early win — thong falls off at 60 licks!
  if(lickGame.count>=69&&!lickGame.thongOff){
    lickGame.thongOff=true;
    lickGame.thongFallT=0;
    spawnParticles(W/2+120,H/2+60,'#f090b0',30,{sMin:3,sMax:8,yBias:6,life:45});
    SFX.thongOff();
  }
  if(lickGame.thongOff) lickGame.thongFallT=(lickGame.thongFallT||0)+1;
  // End after fall animation (40 frames) or timer runs out
  const done=lickGame.timeLeft<=0||(lickGame.thongOff&&lickGame.thongFallT>60);
  if(done){
    lickGame.active=false;
    lickGame.lastScore=lickGame.count;
    if(lickGame.count>lickGame.best)lickGame.best=lickGame.count;
    const bonus=lickGame.count*20+(lickGame.thongOff?500:0);
    score+=bonus;
    const nxt=lickGame.pendingLevel;
    setTimeout(()=>{
      level=nxt;
      if(level>10){state='win_cutscene';winCutsceneT=0;SFX.win();updateHUD();}
      else{ startLevel(); }
    },2200);
    state='lickresult';
  }
}

function drawSky(){
  const rows=palette.sky||['#07080f','#0d1020'];
  const g=ctx.createLinearGradient(0,0,0,FLOOR);
  g.addColorStop(0,rows[0]);g.addColorStop(1,rows[1]||rows[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,FLOOR);

  // Parallax stars / spores
  ctx.fillStyle=T.starColor;
  for(let i=0;i<50;i++){
    const sx=((i*173+worldX*.03)%(W+40))-20;
    const sy=(i*67)%(FLOOR-50);
    const ss=i%5===0?2:1;
    const twinkle=(Math.sin(frameCount*.05+i)*.5+.5);
    ctx.globalAlpha=twinkle*(i%3===0?.9:.5);
    ctx.fillRect(sx,sy,ss,ss);
  }
  ctx.globalAlpha=1;

  // Atmospheric fog layer near floor
  const fog=ctx.createLinearGradient(0,FLOOR-60,0,FLOOR);

}

function drawBricks(){
  const bW=56,bH=18;
  const pa=palette.brickA||T.brickA||'#2e2e2e';
  const pb=palette.brickB||'#242424';
  const offX=worldX%(bW*2);
  for(let row=0;row*bH<FLOOR;row++){
    const shift=row%2===0?0:bW;
    for(let col=-1;col<W/bW+2;col++){

      ctx.fillStyle=row%2===0?pa:pb;
      ctx.fillRect(bx+1,by+1,bW*2-2,bH-2);
      // Highlight on top-left
      ctx.fillStyle='rgba(255,255,255,0.04)';
      ctx.fillRect(bx+1,by+1,bW*2-2,2);
      ctx.fillRect(bx+1,by+1,2,bH-2);
      // Shadow on bottom-right
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(bx+1,by+bH-2,bW*2-2,1);
    }
  }
}

function drawCeiling(){
  ctx.fillStyle=T.ceilColor;ctx.fillRect(0,0,W,22);

  const cg=ctx.createLinearGradient(0,22,0,38);
  cg.addColorStop(0,'rgba(0,0,0,0.6)');cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.fillRect(0,22,W,16);

  if(slimeMode){
    // Dripping slime stalactites
    ctx.fillStyle=T.barColor;
    for(let i=0;i<12;i++){
      const ox=(i*91-(worldX*.05)%(91*12)+W*2)%(W+91*2)-91;
      const dLen=10+Math.sin(ox*.1+frameCount*.02)*7;
      // Stalactite body
      ctx.beginPath();
      ctx.moveTo(ox-6,22);ctx.lineTo(ox+6,22);
      ctx.lineTo(ox+3,22+dLen);ctx.lineTo(ox-3,22+dLen);
      ctx.closePath();ctx.fill();
      // Drip drop
      ctx.beginPath();ctx.arc(ox,22+dLen+5,4,0,Math.PI*2);ctx.fill();
      // Highlight
      ctx.fillStyle='rgba(127,255,0,0.15)';
      ctx.beginPath();ctx.arc(ox-1,22+dLen+4,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=T.barColor;

  } else {
    // Prison bars with shadow
    ctx.fillStyle=T.barColor;
    const spacing=70;const offX=worldX%spacing;

      // Bar highlight
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(x,0,2,40);
    }
    // Horizontal bar at bottom of ceiling
    ctx.fillStyle=T.barColor;ctx.fillRect(0,20,W,4);
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(0,20,W,1);

}

function drawFloor(){
