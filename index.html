      ctx.fillRect(sx+8+i*9,FLOOR-116,5,dLen);
      ctx.beginPath();ctx.arc(sx+10+i*9,FLOOR-116+dLen+5,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(127,255,0,0.3)';
      ctx.beginPath();ctx.arc(sx+9+i*9,FLOOR-116+dLen+4,2,0,Math.PI*2);ctx.fill();
    }
    // Blob mascot on top
    ctx.fillStyle=T.goalPost;
    ctx.beginPath();ctx.arc(sx+30,FLOOR-136,16,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(127,255,0,0.6)';
    ctx.beginPath();ctx.arc(sx+24,FLOOR-140,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.fillRect(sx+22,FLOOR-138,3,3);ctx.fillRect(sx+28,FLOOR-138,3,3);
  } else {
    // Decorative bars between posts
    ctx.fillStyle=gb;
    for(let i=12;i<50;i+=12){
      ctx.fillRect(sx+i,FLOOR-116,4,116);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(sx+i,FLOOR-116,1,116);
      ctx.fillStyle=gb;
    }
    // Star on top
    drawStar(sx+30,FLOOR-142,15,gc);
    // Animated pulse ring
    const pScale=.5+Math.sin(frameCount*.06)*.2;
    ctx.strokeStyle=gc+'66';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(sx+30,FLOOR-142,15+pScale*8,0,Math.PI*2);ctx.stroke();
  }

  const lines=(slimeMode?'SLIME\nHEADQ':'PRISON\nGATE').split('\n');
  lines.forEach((ln,i)=>pxt(ln,sx-6,FLOOR-172+i*16,7,T.goalPost,'left',T.goalPost));
}

function drawStar(cx,cy,r,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(i*4*Math.PI/5)-Math.PI/2;
    const a2=((i*4+2)*Math.PI/5)-Math.PI/2;
    const ox=cx+Math.cos(a)*r,oy=cy+Math.sin(a)*r;
    const ix=cx+Math.cos(a2)*r*.42,iy=cy+Math.sin(a2)*r*.42;
    i===0?ctx.moveTo(ox,oy):ctx.lineTo(ox,oy);ctx.lineTo(ix,iy);
  }
  ctx.closePath();ctx.fill();
  // Star shine
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();
  ctx.arc(cx-3,cy-3,r*.25,0,Math.PI*2);ctx.fill();
}

// ── GUARD DRAW ─────────────────────────────────────────────
function drawGuard(g){
  const x=g.x-worldX;
  if(x+g.w<-30||x>W+30)return;
  if(g.state==='puddle'){
    // Puddle of liquid where the guard melted
    const px=x+g.w/2, py=g.y+g.h;
    const puddleColor=slimeMode?'rgba(127,255,0,0.75)':'rgba(60,200,255,0.75)';
    const puddleShine=slimeMode?'rgba(200,255,100,0.5)':'rgba(160,240,255,0.5)';
    ctx.save();
    ctx.translate(px,py);
    // outer blob
    ctx.fillStyle=puddleColor;
    ctx.beginPath();ctx.ellipse(0,-2,g.w*.85,7,0,0,Math.PI*2);ctx.fill();
    // inner shine
    ctx.fillStyle=puddleShine;
    ctx.beginPath();ctx.ellipse(-3,-3,g.w*.4,3,0,0,Math.PI*2);ctx.fill();
    // hat sticking out of the puddle
    ctx.fillStyle=T.guardHat;
    ctx.fillRect(-6,-11,12,6);ctx.fillRect(-4,-17,8,6);
    ctx.fillStyle=T.guardBadge;ctx.fillRect(-2,-15,4,4);
    ctx.restore();
    return;
  }
  const d=g.dir,bl=g.blinkT,alerting=g.state!=='patrol';
  const wt=g.walkT||0;
  const legOsc=Math.sin(wt*.18)*5;

  // Vision cone
  if(g.state==='chase'){
    ctx.fillStyle='rgba(255,50,30,0.12)';
    ctx.fillRect(d>0?x+g.w:x-150,g.y-15,150,g.h+35);
  } else if(g.state==='alert'){
    ctx.fillStyle='rgba(255,160,0,0.08)';
    ctx.fillRect(d>0?x+g.w:x-110,g.y-8,110,g.h+25);
  }

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(x+g.w/2+2,g.y+g.h+1,g.w/2,3,0,0,Math.PI*2);ctx.fill();

  // Legs with walk animation
  ctx.fillStyle=T.guardLeg;
  const lLeg=alerting?legOsc:0;
  const rLeg=alerting?-legOsc:0;
  ctx.fillRect(x+2,g.y+g.h-14+lLeg,7,14-lLeg);
  ctx.fillRect(x+g.w-9,g.y+g.h-14+rLeg,7,14-rLeg);
  // Boot
  ctx.fillStyle='#111';
  ctx.fillRect(x+(d>0?g.w-11:2),g.y+g.h-5,9,5);

  // Body — shooter guards wear tactical uniforms distinct from standard guards
  // Prison: red tactical  |  Slime: toxic yellow-green tactical
  const bodyDark=g.canShoot?(slimeMode?'#5a8800':'#6b1010'):T.guardBodyDark;
  const bodyMain=g.canShoot?(slimeMode?'#aadd00':'#922020'):T.guardBody;
  ctx.fillStyle=bodyDark;
  ctx.fillRect(x+2,g.y+12,g.w-4,g.h-26);
  ctx.fillStyle=bodyMain;
  ctx.fillRect(x+2,g.y+12,g.w-4-2,g.h-26-2);

  // Shooter: shoulder pads (dark armour plates on each side)
  if(g.canShoot){
    ctx.fillStyle=slimeMode?'#3a6600':'#4a0808';
    ctx.fillRect(x-2,g.y+12,6,9);
    ctx.fillRect(x+g.w-4,g.y+12,6,9);
    ctx.fillStyle=slimeMode?'rgba(180,255,0,0.3)':'rgba(255,80,80,0.2)';
    ctx.fillRect(x-2,g.y+12,6,2);
    ctx.fillRect(x+g.w-4,g.y+12,6,2);
  }

  // Chest detail / uniform lines
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x+g.w/2-1,g.y+14,2,g.h-28);

  // Belt
  ctx.fillStyle=T.guardBelt;ctx.fillRect(x+2,g.y+g.h-26,g.w-4,5);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+2,g.y+g.h-26,g.w-4,1);

  // Badge — shooter gets a warning diamond instead of standard badge
  // Prison: red diamond  |  Slime: toxic orange diamond
  if(g.canShoot){
    ctx.save();ctx.translate(x+g.w/2,g.y+19);ctx.rotate(Math.PI/4);
    ctx.fillStyle=slimeMode?'#ff8800':'#ff2222';ctx.fillRect(-3,-3,6,6);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(-3,-3,3,3);
    ctx.restore();
  } else {
    ctx.fillStyle=T.guardBadge;ctx.fillRect(x+g.w/2-3,g.y+17,6,5);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(x+g.w/2-3,g.y+17,3,2);
  }

  // Head
  ctx.fillStyle=T.guardHead;
  ctx.fillRect(x+3,g.y+2,g.w-6,12);
  // Head shading
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillRect(x+3,g.y+2,g.w-6,4);

  if(g.canShoot){
    // Tactical flat-top helmet — covers more of the head, has a visor strip
    // Prison: dark red  |  Slime: dark toxic olive
    ctx.fillStyle=slimeMode?'#2a4400':'#3a0808';
    ctx.fillRect(x,g.y-6,g.w,8);       // wide flat brim
    ctx.fillRect(x+2,g.y-13,g.w-4,8);  // helmet dome
    // Visor strip across the front
    ctx.fillStyle=slimeMode?'#0d2200':'#1a0404';
    ctx.fillRect(x+2,g.y-6,g.w-4,3);
    ctx.fillStyle=slimeMode?'rgba(180,255,0,0.4)':'rgba(255,80,80,0.3)';
    ctx.fillRect(x+2,g.y-6,g.w-4,1);
    // Helmet top highlight
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+2,g.y-13,g.w-4,1);
    // No hat badge — tactical helmet has none
  } else {
    // Standard peaked hat brim
    ctx.fillStyle=T.guardHat;
    ctx.fillRect(x,g.y-4,g.w,7);
    ctx.fillRect(x+3,g.y-10,g.w-6,7);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x,g.y-4,g.w,1);
    // Hat badge (star/blob)
    ctx.fillStyle=T.guardBadge;
    ctx.fillRect(x+g.w/2-2,g.y-8,4,4);
  }

  // Eyes — alert = red
  const eyeCol=alerting?'#ff2244':'#1a1a1a';
  const eyeX=d>0?x+g.w-7:x+3;
  ctx.fillStyle=eyeCol;
  ctx.fillRect(eyeX,g.y+5,3,bl%50<3?1:3);
  if(alerting){// eye glow
    ctx.fillStyle='rgba(255,30,60,0.4)';
    ctx.beginPath();ctx.arc(eyeX+1,g.y+6,5,0,Math.PI*2);ctx.fill();
  }

  // Slime drip from hat
  if(slimeMode){
    ctx.fillStyle='rgba(127,255,0,0.6)';
    ctx.fillRect(x+6,g.y-10,3,7);
    ctx.beginPath();ctx.arc(x+7,g.y-3,3,0,Math.PI*2);ctx.fill();
  }

  // Gun barrel
  if(g.canShoot){
    ctx.fillStyle=T.guardGun;
    const gunX=d>0?x+g.w:x-11;
    ctx.fillRect(gunX,g.y+13,11,4);
    // Grip
    ctx.fillRect(d>0?x+g.w-2:x+2,g.y+17,4,5);
    // Muzzle flash
    if(g.shootCooldown>levelCfg.guardShootCD-6){
      ctx.fillStyle=T.bulletColor+'cc';
      ctx.beginPath();ctx.arc(d>0?gunX+13:gunX-2,g.y+15,5,0,Math.PI*2);ctx.fill();
    }
  }
  // HP bar — only show after first hit
  if((g.hp||5)<5){
    const bw=g.w+2,bh=3,bx=x-1,by=g.y-18;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#55ddff';ctx.fillRect(bx,by,Math.round(bw*(g.hp/5)),bh);
  }
}

// ── PLAYER DRAW ────────────────────────────────────────────
// ── Draw tongue weapon ─────────────────────────────────────
function drawTongue(){
  if(tongue.phase==='idle'||tongue.len<=0)return;
  const p=player;
  const originX=p.x+(p.facing>0?p.w+1:0);
  const originY=p.y+(p.ducking?8:14);
  const tipX=originX+tongue.dir*tongue.len;

  // Tongue glow
  ctx.save();
  ctx.strokeStyle='rgba(255,100,140,0.3)';
  ctx.lineWidth=8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(originX,originY);ctx.lineTo(tipX,originY+2);ctx.stroke();
  // Tongue body — pink
  ctx.strokeStyle='#e8607a';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(originX,originY);ctx.lineTo(tipX,originY+2);ctx.stroke();
  // Tongue highlight
  ctx.strokeStyle='#ff9aaa';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(originX,originY-1);ctx.lineTo(tipX,originY+1);ctx.stroke();
  // Tongue tip bulb
  ctx.fillStyle='#ff6688';
  ctx.beginPath();ctx.arc(tipX,originY+2,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffaacc';
  ctx.beginPath();ctx.arc(tipX-1,originY+1,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPlayer(){
  const p=player;
  const x=p.x,y=p.y,d=p.facing,duck=p.ducking;
  if(p.hidden)ctx.globalAlpha=0.2;
  // Blink rapidly while post-thong invincibility is active
  if(p.invincible>0&&Math.floor(p.invincible/5)%2===0){ctx.globalAlpha=0.3;}

  const wt=p.walkT;
  // Lickalotapus body proportions: wide round body, big head
  const BW=22,BH=duck?14:24; // body width/height
  const HW=20,HH=18;         // head width/height
  const legOsc=p.onGround&&!duck?Math.sin(wt*.22)*3:0;

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(x+BW/2,FLOOR+3,BW/2+2,4,0,0,Math.PI*2);ctx.fill();

  // ── Feet / paws ──
  const darkPaw='#2a2a38';
  if(!duck){
    ctx.fillStyle=darkPaw;
    // Back foot
    ctx.fillRect(x+(d>0?1:BW-10),y+BH+HH-8+legOsc,10,7);
    // Front foot
    ctx.fillRect(x+(d>0?BW-9:1),y+BH+HH-8-legOsc,10,7);
    // Toe nubs (3 per foot)
    for(let i=0;i<3;i++){
      ctx.fillRect(x+(d>0?1:BW-10)+i*3,(y+BH+HH-8+legOsc)+6,2,2);
      ctx.fillRect(x+(d>0?BW-9:1)+i*3,(y+BH+HH-8-legOsc)+6,2,2);
    }
  } else {
    ctx.fillStyle=darkPaw;
    ctx.fillRect(x+1,y+BH+HH-5,BW-2,5);
    for(let i=0;i<5;i++)ctx.fillRect(x+2+i*4,y+BH+HH-1,2,2);
  }

  // ── Body — round, brown with tan belly ──
  const bodyY=y+HH-4;
  // Body dark outline/shadow
  ctx.fillStyle='#3d2810';
  ctx.fillRect(x-1,bodyY+1,BW+2,BH+2);
  // Main body fur — dark brown
  ctx.fillStyle='#6b4228';
  ctx.fillRect(x,bodyY,BW,BH);
  // Rounded body corners
  ctx.fillStyle='#3d2810';
  ctx.fillRect(x,bodyY,2,2);ctx.fillRect(x+BW-2,bodyY,2,2);
  ctx.fillRect(x,bodyY+BH-2,2,2);ctx.fillRect(x+BW-2,bodyY+BH-2,2,2);
  // Tan belly
  ctx.fillStyle='#c8a07a';
  ctx.fillRect(x+5,bodyY+4,BW-10,BH-5);
  // Belly rounding
  ctx.fillStyle='#6b4228';
  ctx.fillRect(x+5,bodyY+4,1,1);ctx.fillRect(x+BW-6,bodyY+4,1,1);
  // Belly sheen
  ctx.fillStyle='rgba(255,220,180,0.2)';
  ctx.fillRect(x+6,bodyY+5,4,BH-8);
  // Fur texture marks
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.fillRect(x+2,bodyY+3,1,3);ctx.fillRect(x+BW-3,bodyY+5,1,3);
  ctx.fillRect(x+4,bodyY+BH-5,1,2);

  // ── Stubby arms ──
  ctx.fillStyle='#3d2810';
  const armY=bodyY+4;
  if(d>0){// right-facing: left arm back, right arm front
    ctx.fillRect(x-4,armY,7,6);// left (back) arm
    ctx.fillRect(x+BW-2,armY+2,6,6);// right (front) arm
  } else {
    ctx.fillRect(x+BW-3,armY,7,6);
    ctx.fillRect(x-4,armY+2,6,6);
  }
  ctx.fillStyle=darkPaw;
  if(d>0){ctx.fillRect(x-4,armY+4,7,4);ctx.fillRect(x+BW-2,armY+4,6,4);}
  else{ctx.fillRect(x+BW-3,armY+4,7,4);ctx.fillRect(x-4,armY+4,6,4);}

  // ── Beaver tail — wide flat paddle ──
  const tailW=30, tailH=30;
  const tailX=d>0?x-tailW+2:x+BW-2;
  // Shadow
  ctx.fillStyle='#0d0d14';
  ctx.fillRect(tailX+2,bodyY+BH-tailH+2,tailW,tailH);
  // Main paddle
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(tailX,bodyY+BH-tailH,tailW,tailH);
  // Lighter inner face
  ctx.fillStyle='#252535';
  ctx.fillRect(tailX+2,bodyY+BH-tailH+2,tailW-4,tailH-4);
  // Scale grid 3x2
  ctx.fillStyle='rgba(255,255,255,0.1)';
  for(let row=0;row<3;row++) for(let col=0;col<4;col++)
    ctx.fillRect(tailX+3+col*6,bodyY+BH-tailH+4+row*8,4,5);
  // Edge highlight
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fillRect(tailX,bodyY+BH-tailH,2,tailH);

  // ── Head — big, round, on top of body ──
  const headX=x+(d>0?1:0);
  const headY=y;
  // Head shadow
  ctx.fillStyle='#3d2810';
  ctx.fillRect(headX-1,headY+1,HW+1,HH+1);
  // Head fur
  ctx.fillStyle='#6b4228';
  ctx.fillRect(headX,headY,HW,HH);
  // Head rounding
  ctx.fillStyle='#3d2810';
  ctx.fillRect(headX,headY,2,2);ctx.fillRect(headX+HW-2,headY,2,2);
  // Head shine
  ctx.fillStyle='rgba(255,200,150,0.08)';
  ctx.fillRect(headX+2,headY+1,HW-4,4);

  // Small round ears
  ctx.fillStyle='#3d2810';
  ctx.fillRect(headX+2,headY-4,6,5);
  ctx.fillRect(headX+HW-7,headY-4,6,5);
  ctx.fillStyle='#6b4228';
  ctx.fillRect(headX+3,headY-3,4,4);
  ctx.fillRect(headX+HW-6,headY-3,4,4);
  // Inner ear
  ctx.fillStyle='rgba(200,100,120,0.5)';
  ctx.fillRect(headX+4,headY-2,2,2);
  ctx.fillRect(headX+HW-5,headY-2,2,2);

  // ── Thong hat ── (if collected)
  if(player.hasThong){
    const thx=headX-2;
    const thy=headY-12;
    // Pulsing shield glow to show active invulnerability
    const glowPulse=0.6+0.4*Math.sin(frameCount*0.18);
    ctx.shadowColor='#ff88cc';ctx.shadowBlur=10*glowPulse;
    // Waistband sits on top of head
    ctx.fillStyle='#f090b0';ctx.fillRect(thx,thy+6,HW+4,5);
    ctx.fillStyle='#ffcce0';ctx.fillRect(thx,thy+6,HW+4,2);
    // Scallop lace across top
    ctx.fillStyle='#e87aaa';
    for(let s=0;s<4;s++){ctx.fillRect(thx+s*6,thy+3,5,3);ctx.fillRect(thx+s*6+1,thy+1,3,2);}
    // V panel drooping down over forehead
    ctx.fillStyle='#f090b0';
    [[3,11,6],[4,13,4],[5,15,2]].forEach(([ox,oy,w])=>ctx.fillRect(thx+ox,thy+oy,w,2));
    // Side straps dangling
    ctx.fillStyle='#d85888';
    ctx.fillRect(thx-1,  thy+6,3,8);
    ctx.fillRect(thx+HW+2,thy+6,3,8);
    ctx.shadowBlur=0;
  }

  // ── Big googly eyes (facing direction) ──
  const eyeOffX=d>0?HW-8:2;
  const eyeOffX2=d>0?HW-14:8;
  // White sclera
  ctx.fillStyle='#f0f0f0';
  ctx.fillRect(headX+eyeOffX,headY+3,8,8);
  ctx.fillRect(headX+eyeOffX2,headY+3,8,8);
  // Dark pupil
  ctx.fillStyle='#1a1a1a';
  const pupilDx=d>0?2:0;
  ctx.fillRect(headX+eyeOffX+pupilDx+1,headY+5,4,4);
  ctx.fillRect(headX+eyeOffX2+pupilDx+1,headY+5,4,4);
  // Eye shine
  ctx.fillStyle='#ffffff';
  ctx.fillRect(headX+eyeOffX+pupilDx,headY+4,2,2);
  ctx.fillRect(headX+eyeOffX2+pupilDx,headY+4,2,2);
  // Blink
  if(p.blinkT%45<3){
    ctx.fillStyle='#6b4228';
    ctx.fillRect(headX+eyeOffX,headY+3,8,4);
    ctx.fillRect(headX+eyeOffX2,headY+3,8,4);
  }
  // Stress lines on eyes when chased
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(headX+eyeOffX-1,headY+2,1,2);
  ctx.fillRect(headX+eyeOffX2+9,headY+2,1,2);

  // ── Big dark snout / muzzle ──
  const snoutX=d>0?headX+HW-7:headX-1;
  ctx.fillStyle='#2a2a3a';
  ctx.fillRect(snoutX,headY+8,9,8);
  // Snout highlight
  ctx.fillStyle='rgba(100,100,150,0.4)';
  ctx.fillRect(snoutX+1,headY+8,7,2);
  // Nostrils
  ctx.fillStyle='#1a1a28';
  ctx.fillRect(snoutX+1,headY+10,2,2);
  ctx.fillRect(snoutX+5,headY+10,2,2);
  // Whiskers
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillRect(d>0?snoutX-8:snoutX+9,headY+10,8,1);
  ctx.fillRect(d>0?snoutX-6:snoutX+9,headY+12,6,1);
  // Mouth open showing teeth when tongue is out or alert
  const mouthOpen=tongue.phase!=='idle'||caughtFlash>0;
  if(mouthOpen){
    ctx.fillStyle='#c0203a';// gum/mouth interior
    ctx.fillRect(snoutX,headY+14,9,6);
    // Teeth
    ctx.fillStyle='#f0ead8';
    ctx.fillRect(snoutX+1,headY+14,3,3);
    ctx.fillRect(snoutX+5,headY+14,3,3);
    ctx.fillRect(snoutX+1,headY+17,3,3);
    ctx.fillRect(snoutX+5,headY+17,3,3);
  } else {
    // Closed mouth
    ctx.fillStyle='#1a1a28';
    ctx.fillRect(snoutX,headY+14,9,3);
    // Teeth peeking
    ctx.fillStyle='#f0ead8';
    ctx.fillRect(snoutX+1,headY+14,3,2);
    ctx.fillRect(snoutX+5,headY+14,3,2);
  }

  // ── Carried item ──
  if(item&&!duck){
    ctx.font='11px serif';ctx.textBaseline='top';
    ctx.fillText(item.emoji,x+(d>0?BW+1:-14),bodyY+2);
  }

  ctx.globalAlpha=1;
}

// ── TURRET DRAW ────────────────────────────────────────────
function drawTurrets(){
  for(const t of turrets){
    const sx=t.x-worldX;
    if(sx+t.w<-20||sx>W+20)continue;

    // ── Destroyed turret (puddle state) ──────────────────────
    if(t.state==='puddle'){
      // Scorch mark on wall behind bracket
      const scX=t.dir>0?sx-12:sx+t.w+2;
      ctx.save();
      ctx.globalAlpha=0.55;
      ctx.fillStyle='#1a0a00';
      ctx.fillRect(scX,t.y-2,14,t.h+4);
      ctx.globalAlpha=0.25;
      ctx.fillStyle='#ff6600';
      ctx.fillRect(scX+2,t.y,10,t.h);
      ctx.restore();
      // Bracket arm (still bolted in)
      const brkX=t.dir>0?sx-8:sx+t.w;
      ctx.fillStyle='#1a1010';ctx.fillRect(brkX,t.y+t.h/2-3,10,6);
      // Cracked body — dark, scorched
      ctx.fillStyle='#1a1010';ctx.fillRect(sx,t.y+4,t.w,t.h-8);
      // Crack lines across the body
      ctx.save();ctx.strokeStyle='#000';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx+4,t.y+5);ctx.lineTo(sx+t.w-2,t.y+t.h-6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+t.w-5,t.y+5);ctx.lineTo(sx+4,t.y+t.h-6);ctx.stroke();
      ctx.restore();
      // Dead LED (dark red — off)
      ctx.fillStyle='#330000';ctx.fillRect(sx+t.w/2-2,t.y+6,4,4);
      // Barrel drooping down at ~35°
      const barrelX=t.dir>0?sx+t.w:sx-12;
      ctx.save();
      ctx.translate(barrelX+(t.dir>0?0:13),t.y+t.h/2);
      ctx.rotate(t.dir>0?0.6:-0.6);
      ctx.fillStyle='#0d0d0d';ctx.fillRect(0,-4,13,8);
      ctx.fillStyle='#111';ctx.fillRect(0,-3,11,6);
      ctx.restore();
      // Smoke wisps rising from body
      ctx.save();
      for(let i=0;i<3;i++){
        const wox=(i-1)*5;
        const wAlpha=0.18+i*0.06;
        ctx.globalAlpha=wAlpha;
        ctx.fillStyle='#888';
        ctx.beginPath();
        ctx.ellipse(sx+t.w/2+wox,t.y-4-i*5,3,5,0,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      continue;
    }

    const acc=T.accent;
    const danger=T.danger;
    const pulse=Math.sin(t.pulseT*.08)*.5+.5;

    // Detection fan
    if(t.alertAlpha>0){
      const baseA=t.dir>0?0:Math.PI,spread=Math.PI*.25;
      ctx.save();ctx.globalAlpha=t.alertAlpha*.15;
      const fanCol=t.state==='charging'||t.state==='firing'?danger:acc;
      ctx.fillStyle=fanCol;
      ctx.beginPath();ctx.moveTo(sx+t.w/2,t.y+t.h/2);
      ctx.arc(sx+t.w/2,t.y+t.h/2,t.detectRange,baseA-spread,baseA+spread);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }

    // Idle scan laser
    if(t.state==='idle'){
      const scanA=(t.dir>0?0:Math.PI)+Math.sin(t.scanAngle)*.28;
      ctx.save();ctx.globalAlpha=.3+pulse*.15;
      ctx.strokeStyle=acc;ctx.lineWidth=1.5;ctx.setLineDash([5,7]);
      ctx.shadowColor=acc;ctx.shadowBlur=4;
      ctx.beginPath();
      ctx.moveTo(sx+t.w/2,t.y+t.h/2);
      ctx.lineTo(sx+t.w/2+Math.cos(scanA)*85,t.y+t.h/2+Math.sin(scanA)*85);
      ctx.stroke();ctx.setLineDash([]);ctx.restore();
    }

    // Warning/charge beam
    if(t.state==='detecting'||t.state==='charging'){
      const cr=t.state==='charging'?t.chargeT/20:t.chargeT/t.chargeMax;
      const targetA=t.dir>0?0:Math.PI;
      ctx.save();ctx.globalAlpha=.2+cr*.6;
      ctx.strokeStyle=danger;ctx.lineWidth=2+cr*5;
      ctx.shadowColor=danger;ctx.shadowBlur=8+cr*12;
      ctx.beginPath();
      ctx.moveTo(sx+t.w/2,t.y+t.h/2);
      ctx.lineTo(sx+t.w/2+Math.cos(targetA)*t.detectRange*.55,t.y+t.h/2);
      ctx.stroke();
      // Charge ring
      ctx.lineWidth=3;ctx.shadowBlur=6;
      ctx.strokeStyle=danger;ctx.globalAlpha=.9;
      ctx.beginPath();ctx.arc(sx+t.w/2,t.y+t.h/2,t.w/2+7,-Math.PI/2,-Math.PI/2+cr*Math.PI*2);
      ctx.stroke();ctx.restore();
    }

    // Wall bracket — arm bolted into the brick behind the turret
    const brkX=t.dir>0?sx-8:sx+t.w;
    // Bracket arm
    ctx.fillStyle='#141420';
    ctx.fillRect(brkX,t.y+t.h/2-3,10,6);
    // Wall plate (flush to wall)
    ctx.fillStyle='#1a1a2a';
    ctx.fillRect(t.dir>0?sx-10:sx+t.w+2,t.y,8,t.h);
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.fillRect(t.dir>0?sx-10:sx+t.w+2,t.y,2,t.h);
    // Bolt heads top and bottom of wall plate
    ctx.fillStyle='#333344';
    ctx.fillRect(t.dir>0?sx-8:sx+t.w+4,t.y+3,4,4);
    ctx.fillRect(t.dir>0?sx-8:sx+t.w+4,t.y+t.h-7,4,4);
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(t.dir>0?sx-8:sx+t.w+4,t.y+3,2,2);
    ctx.fillRect(t.dir>0?sx-8:sx+t.w+4,t.y+t.h-7,2,2);
    // Drop shadow below turret (subtle, cast on wall)
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.fillRect(sx-2,t.y+t.h,t.w+4,5);

    // Body
    ctx.fillStyle='#2a2a38';ctx.fillRect(sx,t.y+4,t.w,t.h-8);
    ctx.fillStyle='#323245';ctx.fillRect(sx,t.y+4,t.w-2,t.h-8-2);

    // Panel lines
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(sx+t.w/2-1,t.y+5,2,t.h-10);

    // Top cap
    ctx.fillStyle='#3a3a4e';ctx.fillRect(sx+3,t.y,t.w-6,5);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(sx+3,t.y,t.w-6,1);

    // LED — color by state
    const leds={idle:'#00cc44',detecting:'#ffaa00',charging:'#ff6600',firing:'#ff0022',cooldown:'#664400'};
    const ledC=leds[t.state]||'#00cc44';
    ctx.fillStyle=ledC;ctx.fillRect(sx+t.w/2-2,t.y+6,4,4);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(sx+t.w/2-2,t.y+6,2,2);
    // LED glow
    ctx.fillStyle=ledC+'44';
    ctx.beginPath();ctx.arc(sx+t.w/2,t.y+8,7,0,Math.PI*2);ctx.fill();

    // Barrel
    const barrelX=t.dir>0?sx+t.w:sx-12;
    ctx.fillStyle='#111';ctx.fillRect(barrelX,t.y+t.h/2-4,13,8);
    ctx.fillStyle='#222';ctx.fillRect(barrelX,t.y+t.h/2-3,11,6);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(barrelX,t.y+t.h/2-3,11,1);

    // Muzzle flash
    if(t.state==='firing'&&t.burstCooldown>7){
      const tipX=t.dir>0?barrelX+14:barrelX-3;
      ctx.fillStyle=T.bulletColor+'bb';
      ctx.beginPath();ctx.arc(tipX,t.y+t.h/2,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath();ctx.arc(tipX,t.y+t.h/2,2,0,Math.PI*2);ctx.fill();
    }

    // Detect/charge warning icon
    if((t.state==='detecting'||t.state==='charging')&&t.alertAlpha>.3){
      ctx.save();ctx.globalAlpha=t.alertAlpha;
      ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(t.state==='charging'?'🔴':'⚠️',sx+t.w/2,t.y-5);
      ctx.restore();
    }
  }
}

// ── BULLETS ────────────────────────────────────────────────
function drawBullets(){
  for(const b of bullets){
    const bsx=b.x-worldX;
    if(bsx<-12||bsx>W+12)continue;
    // Glow
    ctx.fillStyle=T.bulletGlow;
    ctx.fillRect(bsx-5,b.y-5,b.w+10,b.h+10);
    // Trail
    ctx.fillStyle=T.bulletColor+'55';
    const td=b.vx>0?-1:1;
    ctx.fillRect(bsx+td*10,b.y+1,10,b.h-2);
    ctx.fillRect(bsx+td*18,b.y+1,6,b.h-2);
    // Core
    ctx.fillStyle=T.bulletColor;
    ctx.fillRect(bsx,b.y,b.w,b.h);
    // Bright tip
    ctx.fillStyle='#fff';
    ctx.fillRect(b.vx>0?bsx+b.w-2:bsx,b.y+1,2,b.h-2);
  }
}

// ── PARTICLES ──────────────────────────────────────────────
function drawParticles(){
  for(const pt of particles){
    ctx.globalAlpha=Math.pow(pt.life/pt.max,0.6);
    ctx.fillStyle=pt.color;
    ctx.fillRect(pt.x-pt.size/2,pt.y-pt.size/2,pt.size,pt.size);
  }
  ctx.globalAlpha=1;
}

// ── BUST CUTSCENE ──────────────────────────────────────────
function drawBustCutscene(){
  const t=bustCutsceneT;
  let alpha=1;
  if(t<40)alpha=t/40;
  else if(t>280)alpha=1-(t-280)/40;

  // Dark background + red scanlines
  ctx.fillStyle='#020004';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(180,0,30,0.08)';
  for(let y2=0;y2<H;y2+=4)ctx.fillRect(0,y2,W,2);
  const vg=ctx.createRadialGradient(W/2,H/2,60,W/2,H/2,W/2);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(150,0,0,0.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.globalAlpha=alpha;

  // Guard slides in from right (700→590 over t=0–35), smirking
  const gSlide=Math.min(1,t/35);
  const gx=Math.round(700-gSlide*110);
  drawCutsceneGuard(gx,205,1.8,true);

  // Lickalotapus on left, dazed, tongue retracted
  const lickX=160,lickY=290;
  drawLickalotapus(lickX,lickY,2.0,1,0,t,0);

  // Dazed stars orbiting above head (visible once guard arrives)
  if(gSlide>=1){
    ctx.fillStyle='#ffeeaa';
    for(let i=0;i<3;i++){
      const angle=t*0.12+i*2.094;
      const sx=Math.round(lickX+42+Math.cos(angle)*20);
      const sy=Math.round(lickY-82+Math.sin(angle)*7);
      // 4-point star pixel shape
      ctx.fillRect(sx-1,sy-3,2,6);
      ctx.fillRect(sx-3,sy-1,6,2);
    }
  }

  // Speech bubble — tail RIGHT, pointing toward guard at gx=590
  const bubA=Math.min(1,Math.max(0,(t-45)/15));
  if(bubA>0){
    ctx.save();ctx.globalAlpha*=bubA;
    const bx=235,by=28,bw=240,bh=72;
    const pop=bubA<1?0.85+bubA*0.15:1;
    ctx.save();
    ctx.translate(bx+bw/2,by+bh/2);ctx.scale(pop,pop);ctx.translate(-(bx+bw/2),-(by+bh/2));
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx+4,by+4,bw,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#222';
    ctx.fillRect(bx,by,bw,3);ctx.fillRect(bx,by+bh-3,bw,3);
    ctx.fillRect(bx,by,3,bh);ctx.fillRect(bx+bw-3,by,3,bh);
    // Tail on right side pointing toward guard
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';
    ctx.fillRect(bx+bw-4,by+bh-18,18,10);
    ctx.fillRect(bx+bw+10,by+bh-12,12,6);
    ctx.fillRect(bx+bw+18,by+bh-8,8,4);
    ctx.fillStyle='#222';
    ctx.fillRect(bx+bw+14,by+bh-18,3,10);
    ctx.fillRect(bx+bw+19,by+bh-12,3,6);
    ctx.fillRect(bx+bw+23,by+bh-8,3,4);
    ctx.fillRect(bx+bw-4,by+bh-4,32,3);
    ctx.font='bold 12px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#1a1a2a';
    if(bustIsGameOver){
      ctx.fillText(bustTaunt.l1,bx+bw/2,by+bh/2-13);
      ctx.fillStyle=slimeMode?'#22aa22':'#cc2222';
      ctx.shadowColor=slimeMode?'#00ff44':'#ff4444';ctx.shadowBlur=5;
      ctx.fillText(bustTaunt.l2,bx+bw/2,by+bh/2+13);
    } else {
      ctx.fillText(bustTaunt.l1,bx+bw/2,by+bh/2-13);
      ctx.fillStyle='#444';
      ctx.fillText(bustTaunt.l2,bx+bw/2,by+bh/2+13);
    }
    ctx.shadowBlur=0;
    ctx.restore();ctx.restore();
  }

  const vig2=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,420);
  vig2.addColorStop(0,'transparent');vig2.addColorStop(1,'rgba(0,0,0,0.75)');
  ctx.fillStyle=vig2;ctx.fillRect(0,0,W,H);
  ctx.restore();

  const fadeAlpha=t<40?1-alpha:t>280?1-alpha:0;
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,W,H);}
}

// ── WIN CUTSCENE (IS ALSO THE FINAL WIN SCREEN) ─────────────
function drawWinCutscene(){
  const t=winCutsceneT;
  // Fade in only — no automatic fade out (player stays here until they press space)
  const alpha=t<50?t/50:1;

  // Left half: prison dark
  ctx.fillStyle='#020004';ctx.fillRect(0,0,W/2,H);
  ctx.fillStyle='rgba(180,0,30,0.05)';
  for(let y2=0;y2<H;y2+=4)ctx.fillRect(0,y2,W/2,2);

  // Right half: outside sky
  const skyGrd=ctx.createLinearGradient(W/2,0,W,H);
  if(slimeMode){skyGrd.addColorStop(0,'#0a4a0a');skyGrd.addColorStop(1,'#001a00');}
  else{skyGrd.addColorStop(0,'#1a6aaa');skyGrd.addColorStop(1,'#0a2244');}
  ctx.fillStyle=skyGrd;ctx.fillRect(W/2,0,W/2,H);

  ctx.save();ctx.globalAlpha=alpha;

  // Confetti on right half — continuous loop (resets every 4s, driven by Date.now)
  ctx.save();
  ctx.beginPath();ctx.rect(W/2+1,0,W/2-1,H);ctx.clip();
  const confT=(Date.now()/900)%4;
  const confCols=[T.accent,T.accent2,'#fff','#ffdd44',slimeMode?'#00ffaa':'#88aaff'];
  for(let i=0;i<22;i++){
    const a=(i/22)*Math.PI*2,r=confT*140;
    const px2=W*0.75+Math.cos(a)*r,py2=H/2+Math.sin(a)*r*0.4;
    ctx.globalAlpha=alpha*Math.max(0,1-confT/4)*(0.5+Math.sin(confT*3+i)*0.4);
    ctx.fillStyle=confCols[i%confCols.length];
    ctx.fillRect(px2,py2,i%3===0?7:4,i%3===0?7:4);
  }
  ctx.restore();
  ctx.globalAlpha=alpha;

  // Dividing line: glowing vertical bar at W/2
  ctx.save();
  ctx.shadowColor=slimeMode?'#7fff00':'#ffdd44';ctx.shadowBlur=14;
  ctx.fillStyle=slimeMode?'#7fff00':'#ffdd44';ctx.fillRect(W/2-2,0,4,H);
  ctx.shadowBlur=0;ctx.restore();

  // Guard on left, confused, stern
  drawCutsceneGuard(155,200,1.8,false);

  // Guard speech bubble (tail pointing RIGHT toward guard face) — pops at t=70
  const gBubA=Math.min(1,Math.max(0,(t-70)/15));
  if(gBubA>0){
    ctx.save();ctx.globalAlpha*=gBubA;
    const bx=260,by=32,bw=186,bh=58;
    const pop=gBubA<1?0.85+gBubA*0.15:1;
    ctx.save();
    ctx.translate(bx+bw/2,by+bh/2);ctx.scale(pop,pop);ctx.translate(-(bx+bw/2),-(by+bh/2));
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx+4,by+4,bw,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#222';
    ctx.fillRect(bx,by,bw,3);ctx.fillRect(bx,by+bh-3,bw,3);
    ctx.fillRect(bx,by,3,bh);ctx.fillRect(bx+bw-3,by,3,bh);
    // Tail on LEFT pointing at guard (guard is at x=155, left of bubble)
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';
    ctx.fillRect(bx-14,by+bh-22,18,12);
    ctx.fillRect(bx-22,by+bh-14,12,7);
    ctx.fillRect(bx-28,by+bh-9,8,5);
    ctx.fillStyle='#222';
    ctx.fillRect(bx-14,by+bh-22,3,12);
    ctx.fillRect(bx-22,by+bh-14,3,7);
    ctx.fillRect(bx-28,by+bh-9,3,5);
    ctx.fillRect(bx-28,by+bh-4,32,3);
    ctx.font='bold 11px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#1a1a2a';
    ctx.fillText(slimeMode?'my slimes...':'Where did',bx+bw/2,by+bh/2-9);
    ctx.fillText(slimeMode?'🤔':'he go? 🤔',bx+bw/2,by+bh/2+11);
    ctx.restore();ctx.restore();
  }

  // Lickalotapus crosses from left to right, then bounces forever
  let lickX, lickTongue=0, walkT2, bounce2=0;
  if(t<60){
    lickX=Math.round(260+(t/60)*90); // 260→350, approaching nervously
    walkT2=t*0.5;
  } else if(t<100){
    lickX=Math.round(350+((t-60)/40)*110); // 350→460, dashes across!
    lickTongue=Math.min(20,(t-60)*0.5);
    walkT2=t*1.2;
  } else {
    lickX=460;
    lickTongue=20+Math.sin(t*0.15)*6;
    walkT2=t*0.6;
    bounce2=Math.round(Math.abs(Math.sin(t*0.18))*-10);
  }
  const tremble=(t<60)?Math.sin(t*0.4)*1.5:0;
  drawLickalotapus(lickX+Math.round(tremble),290+bounce2,2.2,1,lickTongue,t,walkT2);

  // Lickalotapus speech bubble — tail LEFT pointing at Lickalotapus, pops at t=110
  const lBubA=Math.min(1,Math.max(0,(t-110)/15));
  if(lBubA>0){
    ctx.save();ctx.globalAlpha*=lBubA;
    const bx=490,by=18,bw=260,bh=88; // shifted right so left tail points at Lickalotapus (x=460)
    const pop=lBubA<1?0.85+lBubA*0.15:1;
    ctx.save();
    ctx.translate(bx+bw/2,by+bh/2);ctx.scale(pop,pop);ctx.translate(-(bx+bw/2),-(by+bh/2));
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx+4,by+4,bw,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#222';
    ctx.fillRect(bx,by,bw,3);ctx.fillRect(bx,by+bh-3,bw,3);
    ctx.fillRect(bx,by,3,bh);ctx.fillRect(bx+bw-3,by,3,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';
    ctx.fillRect(bx-14,by+bh-22,18,12);
    ctx.fillRect(bx-22,by+bh-14,12,7);
    ctx.fillRect(bx-28,by+bh-9,8,5);
    ctx.fillStyle='#222';
    ctx.fillRect(bx-14,by+bh-22,3,12);
    ctx.fillRect(bx-22,by+bh-14,3,7);
    ctx.fillRect(bx-28,by+bh-9,3,5);
    ctx.fillRect(bx-28,by+bh-4,32,3);
    ctx.font='bold 12px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#1a1a2a';
    ctx.fillText(slimeMode?'SLIMED OUT!! 🏃':'FREEDOM!! 🏃',bx+bw/2,by+22);
    ctx.fillStyle='#444';
    ctx.fillText(slimeMode?'no lick left behind.':'licked my way out fr.',bx+bw/2,by+46);
    ctx.save();
    ctx.shadowColor=slimeMode?'#7fff00':'#ffdd44';ctx.shadowBlur=6;
    ctx.fillStyle=slimeMode?'#7fff00':'#ffdd44';
    ctx.fillText(slimeMode?'fr fr no cap. 💨':'no cap. 🧢',bx+bw/2,by+70);
    ctx.shadowBlur=0;
    ctx.restore();
    ctx.restore();ctx.restore();
  }

  // ── Score panel — fades in at t=480, bottom-right area ──
  const scoreA=Math.min(1,Math.max(0,(t-480)/40));
  if(scoreA>0){
    ctx.save();ctx.globalAlpha*=scoreA;
    // Dark panel on right half below the speech bubble
    const px=415,py=116,pw=376,ph=124;
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle=slimeMode?'rgba(0,120,0,0.3)':'rgba(0,20,80,0.4)';ctx.fillRect(px,py,pw,ph);
    // Panel border
    ctx.fillStyle=slimeMode?'#7fff00':'#ffdd44';
    ctx.fillRect(px,py,pw,2);ctx.fillRect(px,py+ph-2,pw,2);
    ctx.fillRect(px,py,2,ph);ctx.fillRect(px+pw-2,py,2,ph);
    // Score lines
    pxt('FINAL SCORE',px+pw/2,py+10,7,'rgba(200,200,200,0.7)','center');
    pxt(score.toString().padStart(7,'0'),px+pw/2,py+28,14,T.accent,'center',T.accent);
    pxt(slimeMode?'ALL 10 LEVELS SLURPED':'ALL 10 LEVELS LICKED',px+pw/2,py+62,6,T.accent2,'center',T.accent2);
    pxt('A TRUE CRIMINAL MASTERMIND',px+pw/2,py+80,5,'rgba(140,140,140,0.7)','center');
    // Blinking "press space" from t=560
    if(t>560&&Math.floor(Date.now()/550)%2===0){
      pxt('PRESS SPACE TO PLAY AGAIN',px+pw/2,py+100,6,T.accent,'center',T.accent);
    }
    ctx.restore();
  }

  const vig=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,420);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Only fade in, never fade out automatically
  if(t<50){ctx.fillStyle=`rgba(0,0,0,${1-alpha})`;ctx.fillRect(0,0,W,H);}
}

// ── WARDEN CUTSCENE ─────────────────────────────────────────
function drawWardenCutscene(){
  const t=wardenCutsceneT;
  let alpha=1;
  if(t<50)alpha=t/50;
  else if(t>380)alpha=1-(t-380)/50;

  // Dark background, ominous red vignette
  ctx.fillStyle='#020004';ctx.fillRect(0,0,W,H);
  const bgGrd=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,380);
  bgGrd.addColorStop(0,slimeMode?'rgba(0,40,0,0.4)':'rgba(60,0,0,0.4)');
  bgGrd.addColorStop(1,'transparent');
  ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.globalAlpha=alpha;

  // Regular guard: slides in from right (t=0–40) then shoved off right (t=40–80)
  const gIn=Math.min(1,t/40);
  const gOut=t>40?Math.min(1,(t-40)/40):0;
  const regularGx=Math.round(700-gIn*110+gOut*220); // 700→590→810
  if(regularGx<W+50){drawCutsceneGuard(regularGx,205,1.7,true);}

  // Warden slides in from far right (t=50–110)
  const wardenSlide=t>=50?Math.min(1,(t-50)/60):0;
  const wardenGx=Math.round(860-wardenSlide*320); // 860→540
  const wardenGy=320;
  const ws=2.4;
  if(wardenSlide>0){
    drawCutsceneGuard(wardenGx,wardenGy,ws,false);
    // Red authority stripes on hat, drawn in screen space after guard restores transform
    ctx.fillStyle=slimeMode?'#004400':'#aa1a00';
    ctx.fillRect(Math.round(wardenGx-36*ws),Math.round(wardenGy-116*ws),Math.round(72*ws),Math.round(4*ws));
    ctx.fillRect(Math.round(wardenGx-36*ws),Math.round(wardenGy-100*ws),Math.round(72*ws),Math.round(4*ws));
  }

  // Lickalotapus: slides in from left (t=0–40) then bounces briefly, then trembles at t=90+
  const lickSlide=Math.min(1,t/40);
  const lickX=Math.round(-80+lickSlide*280); // arrives at 200
  const trembleAmt=t>=90?Math.sin(t*0.45)*2.5:0;
  const bounce=(lickSlide>=1&&t<90)?Math.abs(Math.sin(t*0.18))*(-7):0;
  drawLickalotapus(lickX+Math.round(trembleAmt),295+Math.round(bounce),2.0,1,0,t,t*0.5);

  // Sweat drops on Lickalotapus when trembling
  if(t>=90){
    const sdrop=(t%36)/36;
    const sy=Math.round(275+sdrop*22);
    const sAlpha=sdrop<0.5?sdrop*2:2-sdrop*2;
    ctx.save();ctx.globalAlpha*=sAlpha*0.8;
    ctx.fillStyle=slimeMode?'#7fff00':'#88ccff';
    ctx.fillRect(lickX+34,sy,5,8);ctx.fillRect(lickX+35,sy+8,3,3);
    ctx.restore();
  }

  // Warning symbols floating between characters (t=95+)
  if(t>=95){
    for(let i=0;i<3;i++){
      const wt=(t*0.5+i*40)%60;
      const wx2=Math.round(275+Math.sin(wt*0.1)*14+(i-1)*24);
      const wy2=Math.round(310-wt*3.0);
      const wA=wt<15?wt/15:wt>45?1-(wt-45)/15:1;
      ctx.save();ctx.globalAlpha*=wA*0.9;
      ctx.fillStyle=slimeMode?'#66ff44':'#ff4422';
      ctx.fillRect(wx2-2,wy2,4,8);   // exclamation shaft
      ctx.fillRect(wx2-2,wy2+10,4,4); // exclamation dot
      ctx.restore();
    }
  }

  // Warden speech bubble — tail LEFT toward Lickalotapus, pops at t=105
  const bubA=Math.min(1,Math.max(0,(t-105)/15));
  if(bubA>0&&wardenSlide>0.3){
    ctx.save();ctx.globalAlpha*=bubA;
    const bx=Math.round(wardenGx-310),by=18,bw=215,bh=78;
    const pop=bubA<1?0.85+bubA*0.15:1;
    ctx.save();
    ctx.translate(bx+bw/2,by+bh/2);ctx.scale(pop,pop);ctx.translate(-(bx+bw/2),-(by+bh/2));
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx+4,by+4,bw,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#222';
    ctx.fillRect(bx,by,bw,3);ctx.fillRect(bx,by+bh-3,bw,3);
    ctx.fillRect(bx,by,3,bh);ctx.fillRect(bx+bw-3,by,3,bh);
    // Tail on right side pointing toward Warden
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';
    ctx.fillRect(bx+bw-4,by+bh-18,18,10);
    ctx.fillRect(bx+bw+10,by+bh-12,12,6);
    ctx.fillRect(bx+bw+18,by+bh-8,8,4);
    ctx.fillStyle='#222';
    ctx.fillRect(bx+bw+14,by+bh-18,3,10);
    ctx.fillRect(bx+bw+19,by+bh-12,3,6);
    ctx.fillRect(bx+bw+23,by+bh-8,3,4);
    ctx.fillRect(bx+bw-4,by+bh-4,32,3);
    ctx.font='bold 12px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=slimeMode?'#114411':'#1a1a2a';
    ctx.fillText(slimeMode?'I\'m watching you,':'I\'m watching you,',bx+bw/2,by+bh/2-13);
    ctx.save();
    ctx.shadowColor=slimeMode?'#00ff44':'#ff2200';ctx.shadowBlur=6;
    ctx.fillStyle=slimeMode?'#22dd22':'#cc1100';
    ctx.fillText(slimeMode?'slime boy. 👁️':'tongue boy. 👁️',bx+bw/2,by+bh/2+13);
    ctx.shadowBlur=0;ctx.restore();
    ctx.restore();ctx.restore();
  }

  const vig=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,420);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.75)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.restore();

  const fadeAlpha=t<50?1-alpha:t>380?1-alpha:0;
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,W,H);}
}

// ── ALERT BUBBLES ──────────────────────────────────────────
function drawAlertBubbles(){
  for(const b of alertBubbles){
    const sx=b.wx-worldX;
    if(sx<-30||sx>W+30)continue;
    ctx.globalAlpha=Math.min(1,b.t/(b.max*.6));
    const bw=b.text.length*8+14;
    const fy=b.wy||FLOOR;
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(sx-2,fy-97,bw+4,24);
    ctx.fillStyle='#fff';ctx.fillRect(sx,fy-95,bw,20);
    ctx.fillStyle='#1a1a1a';ctx.fillRect(sx+2,fy-93,bw-4,16);
    ctx.fillStyle='#fff';ctx.fillRect(sx+5,fy-74,8,5);
    pxt(b.text,sx+5,fy-92,8,'#ff3344');
    ctx.globalAlpha=1;
  }
}

// ── RESPAWN COUNTDOWN ──────────────────────────────────────
function drawRespawnCountdown(){
  drawGame();
  // Fade to black over first 90 frames, hold at 0.72
  const fadeAlpha=Math.min(1,respawnT/90);
  ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,W,H);
  // Only show text once fade is mostly in
  if(respawnT<30)return;
  const textAlpha=Math.min(1,(respawnT-30)/40);
  ctx.globalAlpha=textAlpha;
  // BUSTED
  pxt('BUSTED!',W/2,H/2-50,22,'#ff2244','center','#ff0022');
  pxt(lives+' LIVES LEFT',W/2,H/2-18,9,'#fff','center');
  // Countdown digit (3 → 2 → 1)
  const n=3-Math.floor(respawnT/120);
  if(n>0){
    // pulse: grows briefly on each new digit
    const phase=(respawnT%120)/120;
    const sz=Math.round(44-phase*8); // starts large, shrinks into next beat
    pxt(String(n),W/2,H/2+16,sz,'#ffdd00','center','#ffaa00');
  }
  ctx.globalAlpha=1;
}

function drawHUD(){

  const barCol=prog>.8?T.accent2:T.accent;

  // Level label
  pxt('LV'+level,W/2-136,H-29,11,T.accent,null,T.accent);

  // Distance to goal
  const distLeft=Math.max(0,Math.floor((goalX-worldX-player.x)/50));
  if(distLeft>0)pxt(distLeft+'m',W/2+108,H-29,10,'rgba(255,255,255,0.4)');

  // Skip button (top-right corner) — disabled

  ctx.fillStyle='#44444488';ctx.fillRect(sbx,sby,sbw,1);ctx.fillRect(sbx,sby+sbh-1,sbw,1);

  pxt('SKIP >',sbx+sbw/2,sby+4,7,'#555555','center');
}

// ── GAME SCREEN ────────────────────────────────────────────
function drawGame(){
  drawSky();
  drawBricks();
  drawCeiling();
  drawPlatforms();
  drawHidespots();
  drawFloor();
  drawGoal();
  drawTurrets();
  drawBullets();
  for(const g of guards)drawGuard(g);
  drawAlertBubbles();
  drawTongue();
  drawPlayer();
  // ── Draw thong pickups ──
  for(const tp of thongPickups){
    if(tp.collected)continue;
    tp.bobT=(tp.bobT||0)+0.06;
    const by=tp.y+Math.sin(tp.bobT)*3;
    const tx2=tp.x-worldX;
    if(tx2<-40||tx2>W+40)continue;
    ctx.save();
    // Glow
    ctx.shadowColor='#ff88cc';ctx.shadowBlur=8;
    // Waistband
    ctx.fillStyle='#f090b0';ctx.fillRect(tx2,by+5,16,5);
    ctx.fillStyle='#ffcce0';ctx.fillRect(tx2,by+5,16,2);
    // Scallop lace (3 scallops)
    ctx.fillStyle='#e87aaa';
    for(let s=0;s<3;s++){ctx.fillRect(tx2+s*5,by+2,4,3);ctx.fillRect(tx2+s*5+1,by,2,2);}
    // V panel
    ctx.fillStyle='#f090b0';
    [[1,8,4],[3,6,4],[5,4,2]].forEach(([ox,oy,w])=>ctx.fillRect(tx2+ox,by+oy,w,2));
    // Sparkle
    if(Math.floor(Date.now()/300)%2===0){
      ctx.fillStyle='#fff';
      ctx.fillRect(tx2-2,by+7,2,2);ctx.fillRect(tx2+17,by+7,2,2);
      ctx.fillRect(tx2+7,by-2,2,2);
    }
    ctx.shadowBlur=0;ctx.restore();
  }

  // ── Draw Lickalotapus Coins ──
  for(const c of coins){
    if(c.collected)continue;
    c.bobT=(c.bobT||0)+0.05;
    c.spin=(c.spin||0)+0.08;
    const cx=c.x-worldX;
    if(cx<-20||cx>W+20)continue;
    const cy=c.y-8+Math.sin(c.bobT)*3;
    // Squash horizontally to simulate spin (coin face→edge→face)
    const scaleX=Math.abs(Math.cos(c.spin));
    const cw=Math.max(2,Math.round(10*scaleX));
    const cx0=cx+5-cw/2;
    ctx.save();
    ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
    // Coin body
    ctx.fillStyle=scaleX>0.5?'#ffd700':'#e6a800';
    ctx.fillRect(cx0,cy,cw,10);
    // Rim highlight
    if(scaleX>0.4){
      ctx.fillStyle='#ffe566';
      ctx.fillRect(cx0,cy,cw,2);
      ctx.fillRect(cx0,cy+8,cw,2);
    }
    // "L" detail on face only
    if(scaleX>0.65){
      ctx.fillStyle='#b8860b';
      ctx.fillRect(cx+2,cy+2,2,6);
      ctx.fillRect(cx+2,cy+7,4,2);
    }
    ctx.shadowBlur=0;ctx.restore();
  }

  // ── Draw heart pickup ──
  if(heartPickup&&!heartPickup.collected){
    heartPickup.bobT=(heartPickup.bobT||0)+0.06;
    const hby=heartPickup.y+Math.sin(heartPickup.bobT)*3;
    const hbx=heartPickup.x-worldX;
    if(hbx>=-20&&hbx<=W+20){
      ctx.save();
      ctx.shadowColor='#ff4466';ctx.shadowBlur=10;
      // Pixel heart shape (14×14 grid)
      ctx.fillStyle='#ff2244';
      [[2,0,4],[7,0,4],[1,2,12],[0,4,14],[0,6,14],[1,8,12],[2,10,10],[4,12,6],[6,14,2]].forEach(([ox,oy,w])=>ctx.fillRect(hbx+ox,hby+oy,w,2));
      // Highlight
      ctx.fillStyle='#ff88aa';
      ctx.fillRect(hbx+3,hby+2,2,2);ctx.fillRect(hbx+8,hby+2,2,2);
      ctx.shadowBlur=0;ctx.restore();
    }
  }

  drawParticles();
  drawHUD();

  // Caught flash
  if(caughtFlash>0){
    ctx.fillStyle=`rgba(220,0,30,${(caughtFlash/110)*.55})`;
    ctx.fillRect(0,0,W,H);
    if(caughtFlash>70){
      pxt('BUSTED!',W/2,H/2-14,22,'#ff2244','center','#ff0022');
      pxt(lives>0?lives+' LIVES LEFT':'GAME OVER',W/2,H/2+20,9,'#fff','center');
    }
  }

  // Level clear
  if(clearTimer>0){
    const a=Math.min(.8,(150-clearTimer)/50);
    ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.fillRect(0,0,W,H);
    pxt('PACKAGE',W/2,H/2-40,18,T.accent,'center',T.accent);
    pxt('DELIVERED!',W/2,H/2-8,18,T.accent,'center',T.accent);
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(item?item.emoji:'📦',W/2,H/2+26);
    pxt('+'+(300+level*80)+' PTS',W/2,H/2+60,9,'#fff','center');
    const lb=levelBonuses;
    if(lb){
      const gc=lb.guards?'#55ff88':'rgba(255,255,255,0.35)';
      const tc=lb.turrets?'#55ff88':'rgba(255,255,255,0.35)';
      const cc=lb.coins?'#ffd700':'rgba(255,255,255,0.35)';
      pxt((lb.guards?'✓':'✗')+' ALL GUARDS PUDDLED '+(lb.guards?'+1000':''),W/2,H/2+80,6,gc,'center');
      pxt((lb.turrets?'✓':'✗')+' ALL TURRETS PUDDLED '+(lb.turrets?'+1000':''),W/2,H/2+96,6,tc,'center');
      pxt((lb.coins?'✓':'✗')+' ALL COINS COLLECTED '+(lb.coins?'+500':''),W/2,H/2+112,6,cc,'center');
    }
    if(level<10)pxt('LEVEL '+(level+1)+' LOADING...',W/2,H/2+132,7,'rgba(255,255,255,0.5)','center');
  }
}

// ── TITLE ──────────────────────────────────────────────────
// ── Draw a large scaled Lickalotapus centered on cx,cy with scale s ──────────
function drawLickalotapus(cx,cy,s,facing,tongueLen,blinkT,walkT){
  const d=facing;
  const BW=Math.round(22*s),BH=Math.round(24*s);
  const HW=Math.round(20*s),HH=Math.round(18*s);
  const x=cx-BW/2,y=cy-BH-HH+4;
  const legOsc=Math.sin((walkT||0)*.22)*Math.round(3*s);

  function fr(rx,ry,rw,rh){ctx.fillRect(Math.round(x+rx*s),Math.round(y+ry*s),Math.max(1,Math.round(rw*s)),Math.max(1,Math.round(rh*s)));}
  function arc(ax,ay,r){ctx.beginPath();ctx.arc(Math.round(x+ax*s),Math.round(y+ay*s),Math.max(1,Math.round(r*s)),0,Math.PI*2);ctx.fill();}

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(cx+Math.round(2*s),cy+Math.round(4*s),Math.round((BW/2+4)*s/s*s),Math.round(5*s),0,0,Math.PI*2);ctx.fill();

  // Feet
  const darkPaw='#2a2a38';
  ctx.fillStyle=darkPaw;
  const fy=HH+BH-8;
  fr(d>0?1:BW-10,fy+legOsc,10,7);
  fr(d>0?BW-9:1,fy-legOsc,10,7);
  for(let i=0;i<3;i++){fr(d>0?1+i*3:BW-10+i*3,fy+legOsc+6,2,2);fr(d>0?BW-9+i*3:1+i*3,fy-legOsc+6,2,2);}

  // Body shadow
  const bY=HH-4;
  ctx.fillStyle='#3d2810';fr(-1,bY+1,BW+2,BH+2);
  // Body fur
  ctx.fillStyle='#6b4228';fr(0,bY,BW,BH);
  // Corner rounding
  ctx.fillStyle='#3d2810';
  fr(0,bY,2,2);fr(BW-2,bY,2,2);fr(0,bY+BH-2,2,2);fr(BW-2,bY+BH-2,2,2);
  // Tan belly
  ctx.fillStyle='#c8a07a';fr(5,bY+4,BW-10,BH-5);
  ctx.fillStyle='rgba(255,220,180,0.2)';fr(6,bY+5,4,BH-8);
  // Fur marks
  ctx.fillStyle='rgba(0,0,0,0.2)';
  fr(2,bY+3,1,3);fr(BW-3,bY+5,1,3);fr(4,bY+BH-5,1,2);

  // Arms
  ctx.fillStyle='#3d2810';
  const aY=bY+4;
  if(d>0){fr(-4,aY,7,6);fr(BW-2,aY+2,6,6);}
  else{fr(BW-3,aY,7,6);fr(-4,aY+2,6,6);}
  ctx.fillStyle=darkPaw;
  if(d>0){fr(-4,aY+4,7,4);fr(BW-2,aY+4,6,4);}
  else{fr(BW-3,aY+4,7,4);fr(-4,aY+4,6,4);}

  // Tail — wide flat beaver paddle
  const tW=30,tH=30;
  const tX=d>0?-tW+2:BW-2;
  // Shadow
  ctx.fillStyle='#0d0d14';
  fr(tX+2,bY+BH-tH+2,tW,tH);
  // Main paddle
  ctx.fillStyle='#1a1a2a';
  fr(tX,bY+BH-tH,tW,tH);
  // Lighter face
  ctx.fillStyle='#252535';
  fr(tX+2,bY+BH-tH+2,tW-4,tH-4);
  // Scale grid 3x2
  ctx.fillStyle='rgba(255,255,255,0.1)';
  for(let row=0;row<3;row++) for(let col=0;col<4;col++)
    fr(tX+3+col*6,bY+BH-tH+4+row*8,4,5);
  // Edge highlight
  ctx.fillStyle='rgba(255,255,255,0.06)';
  fr(tX,bY+BH-tH,2,tH);

  // Head shadow
  const hX=d>0?1:0;
  ctx.fillStyle='#3d2810';fr(hX-1,1,HW+1,HH+1);
  // Head fur
  ctx.fillStyle='#6b4228';fr(hX,0,HW,HH);
  ctx.fillStyle='#3d2810';fr(hX,0,2,2);fr(hX+HW-2,0,2,2);
  ctx.fillStyle='rgba(255,200,150,0.08)';fr(hX+2,1,HW-4,4);

  // Ears
  ctx.fillStyle='#3d2810';fr(hX+2,-4,6,5);fr(hX+HW-7,-4,6,5);
  ctx.fillStyle='#6b4228';fr(hX+3,-3,4,4);fr(hX+HW-6,-3,4,4);
  ctx.fillStyle='rgba(200,100,120,0.5)';fr(hX+4,-2,2,2);fr(hX+HW-5,-2,2,2);

  // Eyes
  const e1X=d>0?HW-8:2,e2X=d>0?HW-14:8;
  ctx.fillStyle='#f0f0f0';fr(hX+e1X,3,8,8);fr(hX+e2X,3,8,8);
  ctx.fillStyle='#1a1a1a';
  const pdx=d>0?2:0;
  fr(hX+e1X+pdx+1,5,4,4);fr(hX+e2X+pdx+1,5,4,4);
  ctx.fillStyle='#ffffff';fr(hX+e1X+pdx,4,2,2);fr(hX+e2X+pdx,4,2,2);
  if(blinkT%45<3){ctx.fillStyle='#6b4228';fr(hX+e1X,3,8,4);fr(hX+e2X,3,8,4);}
  // Stress lines
  ctx.fillStyle='rgba(0,0,0,0.6)';fr(hX+e1X-1,2,1,2);fr(hX+e2X+9,2,1,2);

  // Snout
  const snX=d>0?hX+HW-7:hX-1;
  ctx.fillStyle='#2a2a3a';fr(snX,8,9,8);
  ctx.fillStyle='rgba(100,100,150,0.4)';fr(snX+1,8,7,2);
  ctx.fillStyle='#1a1a28';fr(snX+1,10,2,2);fr(snX+5,10,2,2);
  // Whiskers
  ctx.fillStyle='rgba(255,255,255,0.7)';
  fr(d>0?snX-8:snX+9,10,8,1);fr(d>0?snX-6:snX+9,12,6,1);

  // Mouth open (tongue out)
  const mouthOpen=tongueLen>0;
  if(mouthOpen){
    ctx.fillStyle='#c0203a';fr(snX,14,9,6);
    ctx.fillStyle='#f0ead8';
    fr(snX+1,14,3,3);fr(snX+5,14,3,3);
    fr(snX+1,17,3,3);fr(snX+5,17,3,3);
  } else {
    ctx.fillStyle='#1a1a28';fr(snX,14,9,3);
    ctx.fillStyle='#f0ead8';fr(snX+1,14,3,2);fr(snX+5,14,3,2);
  }

  // Tongue (drawn relative to scaled snout tip)
  if(tongueLen>0){
    const tOX=Math.round(x+(snX+(d>0?9:-0))*s);
    const tOY=Math.round(y+(17)*s);
    const tTX=tOX+Math.round(d*tongueLen*s);
    ctx.save();
    ctx.strokeStyle='rgba(255,100,140,0.3)';ctx.lineWidth=Math.round(10*s);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(tOX,tOY);ctx.lineTo(tTX,tOY+Math.round(3*s));ctx.stroke();
    ctx.strokeStyle='#e8607a';ctx.lineWidth=Math.round(6*s);
    ctx.beginPath();ctx.moveTo(tOX,tOY);ctx.lineTo(tTX,tOY+Math.round(3*s));ctx.stroke();
    ctx.strokeStyle='#ff9aaa';ctx.lineWidth=Math.round(2*s);
    ctx.beginPath();ctx.moveTo(tOX,tOY-Math.round(1*s));ctx.lineTo(tTX,tOY+Math.round(2*s));ctx.stroke();
    ctx.fillStyle='#ff6688';ctx.beginPath();ctx.arc(tTX,tOY+Math.round(3*s),Math.round(5*s),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffaacc';ctx.beginPath();ctx.arc(tTX-Math.round(1*s),tOY+Math.round(2*s),Math.round(2.5*s),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawTitle(){

    mp.forEach(([lx,ly],li)=>{

  // Footer badges

  pxt('3 LIVES',leftCX+68,355,11,'rgba(255,255,255,0.4)','center');

  // ── RIGHT HALF: Big animated Lickalotapus ─────────────────
  const charCX=580,charCY=165;
  const scale=2.6; // 2.6× size

  // Character glow backdrop
  const charGlow=ctx.createRadialGradient(charCX,charCY,20,charCX,charCY,170);
  charGlow.addColorStop(0,'rgba(255,100,140,0.15)');charGlow.addColorStop(1,'transparent');
  ctx.fillStyle=charGlow;ctx.fillRect(charCX-170,charCY-200,340,370);

  // Tongue animation cycle: flick out and retract over 90 frames
  const lickCycle=frameCount%90;
  let titleTongueLen=0;
  if(lickCycle<15)      titleTongueLen=lickCycle/15*45;   // extend 0→45
  else if(lickCycle<45) titleTongueLen=45;                 // hold out
  else if(lickCycle<60) titleTongueLen=(60-lickCycle)/15*45; // retract 45→0
  // else 0 (resting)

  const titleBlink=Math.floor(Date.now()/40)%60;
  const titleWalk=lickCycle<60?frameCount:0;
  drawLickalotapus(charCX,charCY,scale,-1,titleTongueLen,titleBlink,titleWalk);

  // Name badge under character

  // Pink particles always orbiting character's head
  const headY=charCY-Math.round(38*scale);
  for(let i=0;i<6;i++){
    const angle=frameCount*.045+i*(Math.PI*2/6);
    const orbitR=Math.round(42*scale);
    const px2=charCX+Math.cos(angle)*orbitR;
    const py2=headY+Math.sin(angle)*orbitR*0.45;
    const pulse=Math.sin(frameCount*.08+i*1.1)*.5+.5;
    ctx.globalAlpha=0.35+pulse*0.55;
    ctx.fillStyle=i%2===0?'#ff6688':'#ffaacc';
    const sz=i%3===0?5:3;
    ctx.fillRect(Math.round(px2)-sz/2,Math.round(py2)-sz/2,sz,sz);
  }
  ctx.globalAlpha=1;
}

// ── WIN SCREEN ─────────────────────────────────────────────
function drawWin(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,slimeMode?'#001a00':'#000820');
  g.addColorStop(1,'#000');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Confetti
  const t2=(Date.now()/900)%4;
  for(let i=0;i<36;i++){
    const a=(i/36)*Math.PI*2,r=t2*180;
    const px2=W/2+Math.cos(a)*r,py2=H/2+Math.sin(a)*r*.4;
    ctx.globalAlpha=Math.max(0,1-t2/4)*(.5+Math.sin(t2*3+i)*.4);
    const cols=[T.accent,T.accent2,'#fff','#ff8888',slimeMode?'#00ffaa':'#88aaff'];
    ctx.fillStyle=cols[i%cols.length];
    ctx.fillRect(px2,py2,i%3===0?8:5,i%3===0?8:5);
  }
  ctx.globalAlpha=1;

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.2)';
  for(let y2=0;y2<H;y2+=3)ctx.fillRect(0,y2,W,1);

  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W/2-200,60,400,60);
  pxt('YOU DID IT!',W/2,68,22,T.accent,'center',T.accent);
  pxt('ALL PACKAGES DELIVERED',W/2,103,7,'rgba(255,255,255,0.8)','center');

  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-160,142,320,80);
  pxt('FINAL SCORE',W/2,150,8,'rgba(200,200,200,0.6)','center');
  pxt(score.toString().padStart(7,'0'),W/2,170,16,T.accent,'center',T.accent);
  pxt('10 LEVELS COMPLETED',W/2,205,7,T.accent2,'center',T.accent2);

  pxt('A TRUE CRIMINAL MASTERMIND',W/2,256,6,'rgba(150,150,150,0.6)','center');

  if(Math.floor(Date.now()/600)%2===0)
    pxt('PRESS SPACE TO PLAY AGAIN',W/2,300,7,T.accent,'center',T.accent);
}

// ── DRAW DISPATCH ──────────────────────────────────────────
function drawLickGame(){
  // Background
  ctx.fillStyle='#0a0005';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,0,80,0.05)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,2);

  const licks=lickGame.count;
  const thongOff=lickGame.thongOff||false;
  const fallT=lickGame.thongFallT||0;

  // ── Legs — centred right half of screen ───────────────────
  const legX=320;    // centre-left
  const legTopY=20;  // start near top
  const skin='#f5c8a0',skinD='#d9966a',skinS='#fde0c8';
  const pink='#f090b0',pinkD='#d85888',pinkL='#ffcce0',lace='#e87aaa';

  // Left thigh (back leg)
  ctx.fillStyle=skinD; ctx.fillRect(legX,    legTopY+2, 26,96);
  ctx.fillStyle=skin;  ctx.fillRect(legX-1,  legTopY,   26,96);
  ctx.fillStyle=skinS; ctx.fillRect(legX,    legTopY+2,  7, 36);
  // Knee — flush, just a 1px narrowing transition, no bump
  ctx.fillStyle=skin;  ctx.fillRect(legX+1,  legTopY+94, 22, 6);
  ctx.fillStyle=skinS; ctx.fillRect(legX+1,  legTopY+94,  6, 3);
  // Left shin — wider at top, tapers down
  for(let i=0;i<12;i++){
    const sw=Math.round(24-i*0.8);
    const off=Math.round((24-sw)/2);
    ctx.fillStyle=skinD; ctx.fillRect(legX+off,   legTopY+100+i*9, sw+2,10);
    ctx.fillStyle=skin;  ctx.fillRect(legX+off-1, legTopY+99+i*9,  sw+2, 9);
  }
  // Left foot — regular
  const lfY=legTopY+100+12*9;
  // Heel
  ctx.fillStyle=skinD; ctx.fillRect(legX,   lfY+2, 12,10);
  ctx.fillStyle=skin;  ctx.fillRect(legX-1, lfY+1, 12,10);
  // Sole
  ctx.fillStyle=skinD; ctx.fillRect(legX-1, lfY+9, 26, 6);
  ctx.fillStyle=skin;  ctx.fillRect(legX-2, lfY+8, 26, 6);
  ctx.fillStyle=skinS; ctx.fillRect(legX-2, lfY+8,  8, 2);
  // 4 toes
  const lTW=[7,6,5,4];
  for(let t=0;t<4;t++){
    ctx.fillStyle=skinD; ctx.fillRect(legX-2+t*6+1, lfY+1, lTW[t], 8);
    ctx.fillStyle=skin;  ctx.fillRect(legX-2+t*6,   lfY,   lTW[t], 8);
    ctx.fillStyle='#ff4488'; ctx.fillRect(legX-2+t*6, lfY, lTW[t], 2);
  }

  // Right thigh (front leg, overlapping)
  const rlx=legX+28;
  ctx.fillStyle=skinD; ctx.fillRect(rlx+1,  legTopY+4, 26,94);
  ctx.fillStyle=skin;  ctx.fillRect(rlx,    legTopY+2, 26,94);
  ctx.fillStyle=skinS; ctx.fillRect(rlx+17, legTopY+4,  6, 34);
  // Knee — flush
  ctx.fillStyle=skin;  ctx.fillRect(rlx+1,  legTopY+94, 22, 6);
  ctx.fillStyle=skinS; ctx.fillRect(rlx+14, legTopY+94,  6, 3);
  // Right shin — wider at top, tapers, angles slightly right
  for(let i=0;i<12;i++){
    const sw=Math.round(24-i*0.8);
    const shift=Math.floor(i*1.4);
    ctx.fillStyle=skinD; ctx.fillRect(rlx+shift+1, legTopY+100+i*9, sw+2,10);
    ctx.fillStyle=skin;  ctx.fillRect(rlx+shift,   legTopY+99+i*9,  sw+2, 9);
  }
  // Right foot — regular, angled
  const rfX=rlx+Math.floor(12*1.4);
  const rfY=legTopY+100+12*9;
  // Heel
  ctx.fillStyle=skinD; ctx.fillRect(rfX,   rfY+2, 12,10);
  ctx.fillStyle=skin;  ctx.fillRect(rfX-1, rfY+1, 12,10);
  // Sole
  ctx.fillStyle=skinD; ctx.fillRect(rfX-1, rfY+9, 26, 6);
  ctx.fillStyle=skin;  ctx.fillRect(rfX-2, rfY+8, 26, 6);
  ctx.fillStyle=skinS; ctx.fillRect(rfX-2, rfY+8,  8, 2);
  // 4 toes
  const rTW=[7,6,5,4];
  for(let t=0;t<4;t++){
    ctx.fillStyle=skinD; ctx.fillRect(rfX-2+t*6+1, rfY+1, rTW[t], 8);
    ctx.fillStyle=skin;  ctx.fillRect(rfX-2+t*6,   rfY,   rTW[t], 8);
    ctx.fillStyle='#ff4488'; ctx.fillRect(rfX-2+t*6, rfY, rTW[t], 2);
  }

  // ── Thong — slides down legs as licks increase ────────────
  // Progress 0..1 over 69 licks; at 1 thong is at ankle
  const prog=Math.min(licks/69,1.0);
  // Thong travels from hip (legTopY+10) to ankle (legTopY+200)
  const thongTravelLen=190;
  let thongY = legTopY+10 + prog*thongTravelLen;
  // If thong has fallen off, animate it dropping below feet
  if(thongOff) thongY = legTopY+10+thongTravelLen + fallT*8;

  if(!thongOff||fallT<30){
    ctx.save();
    if(thongOff) ctx.globalAlpha=Math.max(0,1-fallT/30);
    const tw=76+Math.floor(prog*8); // waistband spans both legs, widens as it slips
    const tx=legX-8;

    // Scalloped lace waistband
    const sc=10,sw2=tw/sc;
    ctx.fillStyle=lace;
    for(let i=0;i<sc;i++){
      const sx2=tx+i*sw2;
      ctx.fillRect(sx2,   thongY,    sw2-1,4);
      ctx.fillRect(sx2+1, thongY-3,  sw2-3,3);
      ctx.fillRect(sx2+2, thongY-5,  sw2-5,2);
    }
    ctx.fillStyle=pinkL;
    for(let i=0;i<sc;i++) ctx.fillRect(tx+i*sw2+2,thongY-4,sw2-6,1);

    // Waistband body
    ctx.fillStyle=pink; ctx.fillRect(tx,thongY+4,tw,7);
    ctx.fillStyle=pinkL; ctx.fillRect(tx,thongY+4,tw,2);
    ctx.fillStyle=pinkD; ctx.fillRect(tx,thongY+10,tw,1);

    // V panel — gets shorter as thong slides down (less leg to cover)
    const panelH=Math.max(4,Math.round(22*(1-prog*0.7)));
    const pvw=32,pvx=tx+22,pvy=thongY+11;
    ctx.fillStyle=pink;
    [[0,pvw],[1,pvw-3],[3,pvw-6],[5,pvw-10],[7,pvw-14],[9,6],[11,3]].forEach(([off,w],i)=>{
      if(w<=0||i*4>panelH)return;
      ctx.fillRect(pvx+off,pvy+i*4,w,3);
    });
    ctx.fillStyle=pinkD;
    [[pvw/2-2,4],[pvw/2-2,3],[pvw/2-1,2]].forEach(([off,w],i)=>{
      if(i*4>panelH)return;
      ctx.fillRect(pvx+off,pvy+4+i*4,w,3);
    });
    // Lace dots
    ctx.fillStyle='rgba(216,88,136,0.3)';
    [[3,4],[10,3],[18,5],[5,12],[14,11]].forEach(([dx,dy])=>{
      if(dy>panelH)return;
      ctx.fillRect(pvx+dx,pvy+dy,3,3);
    });
    ctx.restore();
  }

  // Lickalotapus — left side, scaled up, licking toward the legs
  const lcx=155,    lcy=239; // closer to legs
  const lscale=2.1;
  // Snappy tongue: track frames since last tap
  const tf=lickGame.tongueFrame||0;
  let lickTongueLen=0;
  if(tf<4)       lickTongueLen=(tf/4)*60;        // blast out in 4 frames
  else if(tf<8)  lickTongueLen=60;               // hold at full extension
  else if(tf<12) lickTongueLen=60-((tf-8)/4)*60; // snap back in 4 frames
  else           lickTongueLen=0;                // rest
  const lickBlink=Math.floor(Date.now()/3000)%60<4?Math.floor(Date.now()/40)%4:0;
  drawLickalotapus(lcx,lcy,lscale,1,lickTongueLen,lickBlink,frameCount);

  // ── Lickmeter — large centred dial ───────────────────────
  const pct=Math.min(licks/69,1);
  const dmx=600,  dmy=215, dr=115;
  ctx.save();
  // Outer glow ring
  ctx.beginPath();ctx.arc(dmx,dmy,dr+18,0,Math.PI*2);
  const glowRing=ctx.createRadialGradient(dmx,dmy,dr,dmx,dmy,dr+18);
  glowRing.addColorStop(0,'rgba(255,80,160,0.25)');
  glowRing.addColorStop(1,'rgba(255,80,160,0)');
  ctx.fillStyle=glowRing;ctx.fill();
  // Outer bezel shadow
  ctx.beginPath();ctx.arc(dmx,dmy,dr+10,0,Math.PI*2);
  ctx.fillStyle='#0d0008';ctx.fill();
  // Chrome bezel
  const bezelGrad=ctx.createLinearGradient(dmx-dr,dmy-dr,dmx+dr,dmy+dr);
  bezelGrad.addColorStop(0,'#8a3a7a');bezelGrad.addColorStop(0.35,'#dd88c0');
  bezelGrad.addColorStop(0.5,'#f0aadd');bezelGrad.addColorStop(0.65,'#dd88c0');
  bezelGrad.addColorStop(1,'#5a1a4a');
  ctx.beginPath();ctx.arc(dmx,dmy,dr+8,0,Math.PI*2);
  ctx.strokeStyle=bezelGrad;ctx.lineWidth=10;ctx.stroke();
  // Inner bezel ring
  ctx.beginPath();ctx.arc(dmx,dmy,dr+2,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=3;ctx.stroke();
  // Face
  const faceGrad=ctx.createRadialGradient(dmx-30,dmy-30,8,dmx,dmy,dr);
  faceGrad.addColorStop(0,'#2e0a25');faceGrad.addColorStop(0.6,'#180510');faceGrad.addColorStop(1,'#090005');
  ctx.beginPath();ctx.arc(dmx,dmy,dr,0,Math.PI*2);
  ctx.fillStyle=faceGrad;ctx.fill();
  // Subtle face grid lines
  ctx.strokeStyle='rgba(255,100,160,0.04)';ctx.lineWidth=1;
  for(let gx=-dr;gx<=dr;gx+=20){ctx.beginPath();ctx.moveTo(dmx+gx,dmy-dr);ctx.lineTo(dmx+gx,dmy+dr);ctx.stroke();}
  for(let gy=-dr;gy<=dr;gy+=20){ctx.beginPath();ctx.moveTo(dmx-dr,dmy+gy);ctx.lineTo(dmx+dr,dmy+gy);ctx.stroke();}
  // Tick marks — 24 minor, 4 major zones
  const startAng=-Math.PI*0.75, sweepAng=Math.PI*1.5;
  for(let i=0;i<=24;i++){
    const ang=startAng+sweepAng*(i/24);
    const isMaj=i%6===0;
    const isMed=i%3===0;
    const r0=dr-(isMaj?26:isMed?18:10), r1=dr-4;
    ctx.beginPath();
    ctx.moveTo(dmx+Math.cos(ang)*r0,dmy+Math.sin(ang)*r0);
    ctx.lineTo(dmx+Math.cos(ang)*r1,dmy+Math.sin(ang)*r1);
    ctx.strokeStyle=isMaj?'rgba(255,200,230,1)':isMed?'rgba(255,160,200,0.7)':'rgba(255,120,170,0.3)';
    ctx.lineWidth=isMaj?3:isMed?2:1;ctx.stroke();
    if(isMaj){
      const labels=['0','17','35','52','69'];
      const li=i/6;
      if(labels[li]){
        const labelR=dr-38;
        ctx.font='bold 12px "Press Start 2P"';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='rgba(255,200,230,0.9)';
        ctx.shadowColor='#ff88cc';ctx.shadowBlur=4;
        ctx.fillText(labels[li],dmx+Math.cos(ang)*labelR,dmy+Math.sin(ang)*labelR);
        ctx.shadowBlur=0;
      }
    }
  }
  // Coloured zone arcs on the track ring
  const zoneData=[
    {from:0,   to:0.5,  col:'rgba(255,80,120,0.15)'},
    {from:0.5, to:0.85, col:'rgba(255,40,180,0.15)'},
    {from:0.85,to:1.0,  col:'rgba(255,0,255,0.2)'},
  ];
  zoneData.forEach(z=>{
    ctx.beginPath();
    ctx.arc(dmx,dmy,dr-28,startAng+sweepAng*z.from,startAng+sweepAng*z.to);
    ctx.strokeStyle=z.col;ctx.lineWidth=18;ctx.lineCap='butt';ctx.stroke();
  });
  // Arc track bg
  ctx.beginPath();ctx.arc(dmx,dmy,dr-28,startAng,startAng+sweepAng);
  ctx.strokeStyle='rgba(255,100,150,0.08)';ctx.lineWidth=18;ctx.lineCap='round';ctx.stroke();
  // Arc fill
  if(pct>0){
    const arcCol=pct<0.5?'#ff5577':pct<0.85?'#ff11bb':'#ff00ff';
    ctx.beginPath();ctx.arc(dmx,dmy,dr-28,startAng,startAng+sweepAng*pct);
    ctx.strokeStyle=arcCol;ctx.lineWidth=18;ctx.lineCap='round';
    ctx.shadowColor=arcCol;ctx.shadowBlur=20;ctx.stroke();
    // Bright inner highlight on arc
    ctx.beginPath();ctx.arc(dmx,dmy,dr-28,startAng,startAng+sweepAng*pct);
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=4;ctx.shadowBlur=0;ctx.stroke();
    ctx.shadowBlur=0;
  }
  // Needle
  const needleAng=startAng+sweepAng*pct;
  const nLen=dr-16, nBack=20, nW=3;
  // Needle shadow
  ctx.beginPath();
  ctx.moveTo(dmx+Math.cos(needleAng+Math.PI)*nBack+2,dmy+Math.sin(needleAng+Math.PI)*nBack+2);
  ctx.lineTo(dmx+Math.cos(needleAng)*nLen+2,dmy+Math.sin(needleAng)*nLen+2);
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=nW+2;ctx.lineCap='round';ctx.stroke();
  // Needle body
  ctx.beginPath();
  ctx.moveTo(dmx+Math.cos(needleAng+Math.PI)*nBack,dmy+Math.sin(needleAng+Math.PI)*nBack);
  ctx.lineTo(dmx+Math.cos(needleAng)*nLen,dmy+Math.sin(needleAng)*nLen);
  const needleGrad=ctx.createLinearGradient(
    dmx+Math.cos(needleAng+Math.PI)*nBack,dmy+Math.sin(needleAng+Math.PI)*nBack,
    dmx+Math.cos(needleAng)*nLen,dmy+Math.sin(needleAng)*nLen
  );
  needleGrad.addColorStop(0,'#882266');needleGrad.addColorStop(0.5,'#ffffff');needleGrad.addColorStop(1,'#ffaacc');
  ctx.strokeStyle=needleGrad;ctx.lineWidth=nW;ctx.lineCap='round';
  ctx.shadowColor='#ff88cc';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
  // Centre cap outer
  ctx.beginPath();ctx.arc(dmx,dmy,16,0,Math.PI*2);
  ctx.fillStyle='#330022';ctx.fill();
  ctx.strokeStyle='#cc55aa';ctx.lineWidth=3;ctx.stroke();
  // Centre cap inner
  ctx.beginPath();ctx.arc(dmx,dmy,10,0,Math.PI*2);
  const capGrad=ctx.createRadialGradient(dmx-3,dmy-3,1,dmx,dmy,10);
  capGrad.addColorStop(0,'#ffccee');capGrad.addColorStop(1,'#cc44aa');
  ctx.fillStyle=capGrad;ctx.fill();
  // LICKMETER label
  ctx.font='bold 13px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,190,220,0.7)';
  ctx.shadowColor='#ff66aa';ctx.shadowBlur=6;
  ctx.fillText('LICKMETER',dmx,dmy+dr-44);ctx.shadowBlur=0;
  // Digital count readout
  const rdW=90,rdH=34,rdX=dmx-rdW/2,rdY=dmy+42;
  ctx.fillStyle='#0a0008';ctx.fillRect(rdX,rdY,rdW,rdH);
  ctx.strokeStyle='rgba(255,100,160,0.5)';ctx.lineWidth=2;ctx.strokeRect(rdX,rdY,rdW,rdH);
  // LCD scanline effect
  for(let ry=rdY+2;ry<rdY+rdH-2;ry+=3){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(rdX+2,ry,rdW-4,1);}
  const countCol=pct<0.5?'#ff9aaa':pct<0.85?'#ff44cc':'#ff00ff';
  ctx.font='bold 20px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=countCol;ctx.shadowColor=countCol;ctx.shadowBlur=8;
  ctx.fillText(licks,dmx,rdY+rdH/2);ctx.shadowBlur=0;
  // "/69" sub-label
  ctx.font='7px "Press Start 2P"';ctx.fillStyle='rgba(255,150,180,0.5)';
  ctx.fillText('/ 69',dmx+28,rdY+rdH-8);
  ctx.restore();
  if(licks>=69) pxt('THONG LICKED OFF! 🩲💨',W/2,H/2-30,10,'#ffdd44','center','#ffaa00');

  // Timer bar
  const tRatio=lickGame.timeLeft/600;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(10,22,W-20,8);
  ctx.fillStyle=tRatio>.4?'#ff4466':tRatio>.2?'#ff8800':'#ff2222';
  ctx.fillRect(11,23,Math.floor((W-22)*tRatio),6);
  pxt(Math.ceil(lickGame.timeLeft/60)+'s',W-18,18,6,'rgba(255,255,255,0.6)','right');

  pxt('LICK CHALLENGE!',W/2,6,8,'#ff6688','center','#ff4466');
  if(Math.floor(Date.now()/400)%2===0&&licks<69)
    pxt('CLICK TO LICK! 👅 TAP / SPACE / CLICK',W/2,H-18,10,'#ff9aaa','center');
  if(lickGame.best>0) pxt('BEST: '+lickGame.best,W/2+100,14,6,'rgba(255,200,210,0.5)','center');

  drawParticles();
}

function drawLickResult(){
  ctx.fillStyle='#0a0005';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,0,80,0.05)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,2);

  const thongBonus=lickGame.thongOff?500:0;
  const bonus=lickGame.lastScore*20+thongBonus;
  if(lickGame.thongOff){
    pxt('THONG LICKED OFF! 🩲',W/2,42,11,'#ffdd44','center','#ffaa00');
    pxt(lickGame.lastScore+' LICKS',W/2,80,14,'#ff9aaa','center','#ff6688');
    pxt('+'+bonus+' BONUS PTS',W/2,110,9,T.accent,'center',T.accent);
    pxt('+500 THONG BONUS!',W/2,132,8,'#ffdd44','center','#ffcc00');
  } else {
    pxt('TIME IS UP!',W/2,55,16,'#ff6688','center','#ff4466');
    pxt(lickGame.lastScore+' LICKS',W/2,110,18,'#ff9aaa','center','#ff6688');
    pxt('+'+bonus+' BONUS PTS',W/2,158,9,T.accent,'center',T.accent);
  }
  if(lickGame.lastScore===lickGame.best&&lickGame.best>0)
    pxt('NEW RECORD! 🏆',W/2,186,8,'#ffdd44','center','#ffcc00');
  pxt('NEXT LEVEL LOADING...',W/2,H-35,7,'rgba(200,200,200,0.5)','center');
  drawParticles();
}
