// ── Shared cutscene guard portrait ──────────────────────────
// gx,gy = face centre (unscaled coords), gs = scale, smirk = expression
function drawCutsceneGuard(gx, gy, gs, smirk){
  const skinMain = slimeMode ? '#aaff80' : '#c8a870';
  const skinDark = slimeMode ? '#5a9a3a' : '#6a5a3a';
  const skinMid  = slimeMode ? '#80cc50' : '#b89860';
  const earInner = slimeMode ? 'rgba(40,160,40,0.5)' : 'rgba(180,100,80,0.4)';
  const hatBrim  = slimeMode ? '#2a6a00' : '#223344';
  const hatBody  = slimeMode ? '#3a8a00' : '#2a3d52';
  const hatTop   = slimeMode ? '#1a5000' : '#1a2d40';
  const collarD  = slimeMode ? '#0a1a0a' : '#334';
  const collarL  = slimeMode ? '#162616' : '#445';
  const neckCol  = slimeMode ? '#60aa40' : '#8a7a5a';
  const browCol  = slimeMode ? '#2a6010' : '#8a6a3a';
  const browLine = slimeMode ? '#163a08' : '#5a3a1a';
  const mouthDark= slimeMode ? '#1a4a1a' : '#5a3a2a';
  const mouthLine= slimeMode ? '#0a2a0a' : '#3a1a0a';

  ctx.save();
  ctx.translate(gx, gy); ctx.scale(gs, gs); ctx.translate(-gx, -gy);
  const ox=gx, oy=gy;

  // Neck
  ctx.fillStyle=neckCol; ctx.fillRect(ox-14,oy+54,28,44);
  // Shirt / collar
  ctx.fillStyle=collarD; ctx.fillRect(ox-32,oy+82,64,34);
  ctx.fillStyle=collarL; ctx.fillRect(ox-24,oy+80,48,7);
  // Chest badge
  ctx.fillStyle='#f0c030'; ctx.fillRect(ox-11,oy+92,22,16);
  ctx.fillStyle='#c8a020'; ctx.fillRect(ox-9, oy+94,18,10);
  ctx.fillStyle=slimeMode?'#7fff00':'#fff'; ctx.fillRect(ox-5,oy+96,10,6);

  // Head shadow
  ctx.fillStyle=skinDark; ctx.fillRect(ox-38+2,oy-74+2,76,76);
  // Head
  ctx.fillStyle=skinMain; ctx.fillRect(ox-38,oy-74,76,76);
  ctx.fillStyle='rgba(255,240,200,0.18)'; ctx.fillRect(ox-32,oy-70,30,24);

  // Ears
  ctx.fillStyle=skinMid;
  ctx.fillRect(ox-48,oy-46,10,22); ctx.fillRect(ox+38,oy-46,10,22);
  ctx.fillStyle=earInner;
  ctx.fillRect(ox-46,oy-42,6,14);  ctx.fillRect(ox+40,oy-42,6,14);

  // Hat brim
  ctx.fillStyle=hatBrim; ctx.fillRect(ox-44,oy-84,88,14);
  // Cap body
  ctx.fillStyle=hatBody; ctx.fillRect(ox-36,oy-128,72,46);
  // Cap top shadow
  ctx.fillStyle=hatTop;  ctx.fillRect(ox-36,oy-128,72,6);
  // Hat strap band
  ctx.fillStyle=hatBrim; ctx.fillRect(ox-36,oy-94,72,8);
  // Hat badge
  ctx.fillStyle='#f0c030'; ctx.fillRect(ox-11,oy-116,22,16);
  ctx.fillStyle='#c8a020'; ctx.fillRect(ox-9, oy-114,18,10);
  ctx.fillStyle='#fff';    ctx.fillRect(ox-6, oy-112,12,6);

  // Brow ridge
  ctx.fillStyle=browCol;
  ctx.fillRect(ox-34,oy-44,30,8); ctx.fillRect(ox+4,oy-44,30,8);
  // Brow crease lines
  ctx.fillStyle=browLine;
  if(smirk){
    ctx.fillRect(ox-30,oy-46,22,3); ctx.fillRect(ox+10,oy-48,22,3);
  } else {
    ctx.fillRect(ox-30,oy-48,22,3); ctx.fillRect(ox+10,oy-48,22,3);
    ctx.fillRect(ox-5, oy-52,10,7); // central crease — stern
  }

  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(ox-30,oy-36,22,14); ctx.fillRect(ox+8,oy-36,22,14);
  // Pupils
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(ox-24,oy-34,10,10); ctx.fillRect(ox+14,oy-34,10,10);
  // Eye shine
  ctx.fillStyle='#fff';
  ctx.fillRect(ox-24,oy-34,3,3); ctx.fillRect(ox+14,oy-34,3,3);
  // Squint lids
  ctx.fillStyle=skinMain;
  ctx.fillRect(ox-30,oy-36,22,smirk?4:6); ctx.fillRect(ox+8,oy-36,22,smirk?4:6);

  // Nose
  ctx.fillStyle=skinMid; ctx.fillRect(ox-8,oy-22,16,18);
  ctx.fillStyle=skinDark;
  ctx.fillRect(ox-12,oy-10,10,8); ctx.fillRect(ox+2,oy-10,10,8);
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(ox-10,oy-9,6,5); ctx.fillRect(ox+4,oy-9,6,5);

  // Mouth
  ctx.fillStyle=mouthDark; ctx.fillRect(ox-20,oy+8,40,6);
  ctx.fillStyle=mouthLine; ctx.fillRect(ox-18,oy+10,36,3);
  if(smirk){
    ctx.fillStyle=skinMain; ctx.fillRect(ox+14,oy+8,8,5); // corner up
    ctx.fillStyle='#f0f0f0'; ctx.fillRect(ox-10,oy+8,8,4); // teeth peek
  } else {
    ctx.fillStyle=skinMain; ctx.fillRect(ox-22,oy+8,4,4); // both corners neutral
    ctx.fillRect(ox+18,oy+8,4,4);
  }

  // Jaw definition
  ctx.fillStyle=skinDark;
  ctx.fillRect(ox-34,oy+18,12,22); ctx.fillRect(ox+22,oy+18,12,22);
  ctx.fillStyle=skinMid; ctx.fillRect(ox-12,oy+28,24,8); // chin

  ctx.restore();
}

function drawConjugalCutscene(){
  const t=conjugalCutsceneT;
  let alpha=1;
  if(t<50)       alpha=t/50;
  else if(t>480) alpha=1-(t-480)/50;

  // Background
  ctx.fillStyle=slimeMode?'#020d02':'#000'; ctx.fillRect(0,0,W,H);
  const bgGrd=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,340);
  bgGrd.addColorStop(0,slimeMode?'rgba(20,100,20,0.3)':'rgba(80,40,10,0.3)');
  bgGrd.addColorStop(1,'transparent');
  ctx.fillStyle=bgGrd; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.globalAlpha=alpha;

  // ── Floating hearts / slime drops between chars ───────────
  if(t>50 && t<500){
    const hPhase=Math.min(1,(t-50)/15)*Math.min(1,(500-t)/15);
    ctx.save(); ctx.globalAlpha*=hPhase;
    for(let i=0;i<4;i++){
      const ht=(t+i*55)%80;
      const hx=370+Math.sin(ht*0.13)*18+(i-2)*14;
      const hy=320-ht*3.2;
      const hA=ht<20?ht/20:ht>60?1-(ht-60)/20:1;
      ctx.save(); ctx.globalAlpha*=hA;
      ctx.fillStyle=slimeMode?'#7fff00':'#ff4488';
      ctx.fillRect(hx-4,hy-4,4,4); ctx.fillRect(hx,  hy-4,4,4);
      ctx.fillRect(hx-6,hy,  12,4);
      ctx.fillRect(hx-4,hy+4, 8,4);
      ctx.fillRect(hx-2,hy+8, 4,4);
      ctx.restore();
    }
    ctx.restore();
  }

  // ── Lickalotapus — slide in then bounce with tongue out ───
  const lickSlide=Math.min(1,t/35);
  const lickX=Math.round(-80+lickSlide*290); // arrives at ~210
  const bounce=lickSlide>=1?Math.abs(Math.sin(t*0.18))*(-9):0;
  const lickY=300+Math.round(bounce);
  const tongueOut=lickSlide>=1?18+Math.sin(t*0.15)*8:0;
  drawLickalotapus(lickX,lickY,2.4,1,tongueOut,t,t*0.6);

  // ── Guard face — right side, nods once ────────────────────
  const nod=t>=40&&t<72?Math.sin((t-40)/32*Math.PI)*6:0;
  drawCutsceneGuard(590,205+Math.round(nod),1.7,true);

  // ── Speech bubble — pops in at t=50 ──────────────────────
  const bubA=Math.min(1,Math.max(0,(t-50)/15));
  if(bubA>0){
    ctx.save(); ctx.globalAlpha*=bubA;
    const bx=255,by=18,bw=260,bh=110;
    const pop=bubA<1?0.85+bubA*0.15:1;
    ctx.save();
    ctx.translate(bx+bw/2,by+bh/2); ctx.scale(pop,pop); ctx.translate(-(bx+bw/2),-(by+bh/2));
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx+4,by+4,bw,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f5f4ec'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#222';
    ctx.fillRect(bx,by,bw,3);ctx.fillRect(bx,by+bh-3,bw,3);
    ctx.fillRect(bx,by,3,bh);ctx.fillRect(bx+bw-3,by,3,bh);
    // Tail on right side pointing toward guard (guard is at x=590, right of bubble centre)
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f5f4ec';
    ctx.fillRect(bx+bw-4,by+bh-22,18,12);
    ctx.fillRect(bx+bw+10,by+bh-14,12,7);
    ctx.fillRect(bx+bw+18,by+bh-9,8,5);
    ctx.fillStyle='#222';
    ctx.fillRect(bx+bw+14,by+bh-22,3,12);
    ctx.fillRect(bx+bw+19,by+bh-14,3,7);
    ctx.fillRect(bx+bw+23,by+bh-9,3,5);
    ctx.fillRect(bx+bw-4,by+bh-4,32,3);
    ctx.font='bold 13px "Press Start 2P"';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#1a1a2a';
    ctx.fillText("You've won a",bx+bw/2,by+26);
    ctx.fillText('10 second conjugal.',bx+bw/2,by+54);
    ctx.fillStyle=slimeMode?'#007700':'#cc0044';
    ctx.shadowColor=slimeMode?'#00ff44':'#ff4488'; ctx.shadowBlur=6;
    ctx.fillText(slimeMode?'Get Slurpin. 👅':'Get Lickin. 👅',bx+bw/2,by+84);
    ctx.shadowBlur=0;
    ctx.restore(); ctx.restore();
  }

  // ── Vignette ─────────────────────────────────────────────
  const vig=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,420);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.restore();

  const fadeAlpha=t<50?1-alpha:t>480?1-alpha:0;
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,W,H);}
}

function drawCutscene(){
  const t=cutsceneT;
  // Fade in 0-50, hold 50-700, fade out 700-750
  let alpha=1;
  if(t<50)       alpha=t/50;
  else if(t>700) alpha=1-(t-700)/50;

  // Background
  ctx.fillStyle=slimeMode?'#020d02':'#000'; ctx.fillRect(0,0,W,H);
  if(slimeMode){
    const bgGrd=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,320);
    bgGrd.addColorStop(0,'rgba(0,80,0,0.3)'); bgGrd.addColorStop(1,'transparent');
    ctx.fillStyle=bgGrd; ctx.fillRect(0,0,W,H);
  }

  ctx.save(); ctx.globalAlpha=alpha;

  // ── Lickalotapus — slides in from left (t=0-40), then trembles ──
  const lickSlide=Math.min(1,t/40);
  const lickX=Math.round(-60+lickSlide*270); // arrives at ~210
  const tremble=lickSlide>=1?Math.sin(t*0.42)*1.5:0;
  const lickY=290;
  const lickTongue=lickSlide>=1?Math.max(0,Math.sin(t*0.08))*22:0;
  drawLickalotapus(lickX+tremble,lickY,2.2,1,lickTongue,t,t*0.5);

  // ── Saliva / drool ───────────────────────────────────────
  if(lickSlide>=1){
    const salivaCol   = slimeMode?'#b0ff70':'#a0eeff';
    const salivaGlow  = slimeMode?'rgba(140,255,80,0.45)':'rgba(120,230,255,0.45)';
    const salivaLight = slimeMode?'rgba(200,255,160,0.7)':'rgba(200,245,255,0.7)';
    const droolOriX = Math.round(lickX+69); // snout tip X
    const droolOriY = Math.round(lickY-41); // mouth bottom Y
    const flrY      = Math.round(lickY+98); // floor / toe level
    const dropRange = flrY - droolOriY;

    ctx.save();
    // ── Small puddle (grows from t=40, max ~28px) ─────────
    const pudW = Math.min(28, (t-40)*0.12);
    const pudH = pudW*0.28;
    if(pudW>0){
      ctx.fillStyle = slimeMode?'rgba(140,255,80,0.35)':'rgba(120,220,255,0.35)';
      ctx.beginPath(); ctx.ellipse(droolOriX, flrY+8, pudW, pudH, 0, 0, Math.PI*2); ctx.fill();
    }

    // ── 2 drool strands ───────────────────────────────────
    const strandDefs=[
      {ox:-5, delay:0,  maxFrac:0.7, thickBase:2.5},
      {ox: 5, delay:10, maxFrac:0.6, thickBase:2.0},
    ];
    strandDefs.forEach((sd,i)=>{
      const phase = t*0.038 + i*1.3;
      const grow  = Math.min(1, Math.max(0,(t-40-sd.delay)*0.014));
      const len   = grow * sd.maxFrac * dropRange;
      if(len<=0) return;
      const ox  = droolOriX + sd.ox;
      const wob = Math.sin(phase)*2;
      const ex  = ox + wob;
      const ey  = droolOriY + len;
      ctx.strokeStyle=salivaGlow; ctx.lineWidth=sd.thickBase*2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(ox,droolOriY); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.strokeStyle=salivaCol; ctx.lineWidth=sd.thickBase;
      ctx.beginPath(); ctx.moveTo(ox,droolOriY); ctx.lineTo(ex,ey); ctx.stroke();
      const beadR = sd.thickBase*0.9 + grow*1.5;
      ctx.fillStyle=salivaCol; ctx.beginPath(); ctx.arc(ex,ey,beadR,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=salivaLight; ctx.beginPath(); ctx.arc(ex-beadR*0.3,ey-beadR*0.3,beadR*0.4,0,Math.PI*2); ctx.fill();
    });

    // ── 2 drip drops ──────────────────────────────────────
    for(let di=0;di<2;di++){
      const dropT = (t*0.5 + di*35) % 65;
      if(dropT<55){
        const dox = droolOriX + (di===0?-4:4);
        const doy = droolOriY + (dropT/55)*dropRange;
        ctx.fillStyle=salivaCol; ctx.beginPath(); ctx.arc(dox,doy,2,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
  }

  // Sweat drop (nervous) after arrival
  if(lickSlide>=1){
    const sdrop=(t%36)/36; // 0→1 loop
    const sy=lickY-95+sdrop*22;
    const sAlpha=sdrop<0.5?sdrop*2:2-sdrop*2;
    ctx.save(); ctx.globalAlpha*=sAlpha*0.8;
    ctx.fillStyle=slimeMode?'#7fff00':'#88ccff';
    ctx.fillRect(lickX+32,sy,5,8); ctx.fillRect(lickX+33,sy+8,3,3);
    ctx.restore();
  }

  // ── Guard face — right side, bobs once ──────────────────
  const guardBob=t>=35&&t<66?Math.sin((t-35)/31*Math.PI)*(-5):0;
  drawCutsceneGuard(590,200+Math.round(guardBob),1.8,false);

  // ── Speech bubble — pops in at t=45 ─────────────────────
  const bubA=Math.min(1,Math.max(0,(t-45)/15));
  if(bubA>0){
    ctx.save(); ctx.globalAlpha*=bubA;
    const bx=258,by=28,bw=240,bh=68;
    const pop=bubA<1?0.85+bubA*0.15:1;
    ctx.save();
    ctx.translate(bx+bw/2,by+bh/2); ctx.scale(pop,pop); ctx.translate(-(bx+bw/2),-(by+bh/2));
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx+4,by+4,bw,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#222';
    ctx.fillRect(bx,by,bw,3);ctx.fillRect(bx,by+bh-3,bw,3);
    ctx.fillRect(bx,by,3,bh);ctx.fillRect(bx+bw-3,by,3,bh);
    ctx.fillStyle=slimeMode?'#e8ffe8':'#f0efe8';
    ctx.fillRect(bx+bw-4,by+bh-18,18,10);
    ctx.fillRect(bx+bw+10,by+bh-12,12,6);
    ctx.fillRect(bx+bw+18,by+bh-8,8,4);
    ctx.fillStyle='#222';
    ctx.fillRect(bx+bw+14,by+bh-18,3,10);
    ctx.fillRect(bx+bw+19,by+bh-12,3,6);
    ctx.fillRect(bx+bw+23,by+bh-8,3,4);
    ctx.fillRect(bx+bw-4,by+bh-4,32,3);
    ctx.font='bold 13px "Press Start 2P"';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#1a1a2a';
    ctx.fillText('Do you even',bx+bw/2,by+bh/2-12);
    ctx.fillText(slimeMode?'slurp bro? 👅':'lick bro? 👅',bx+bw/2,by+bh/2+14);
    ctx.restore(); ctx.restore();
  }

  // ── Vignette ─────────────────────────────────────────────
  const vig=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,420);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.75)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  ctx.restore();

  const fadeAlpha=t<50?1-alpha:t>700?1-alpha:0;
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,W,H);}
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(state==='title'){drawTitle();return;}
  if(state==='cutscene'){drawCutscene();return;}
  if(state==='bust_cutscene'){drawBustCutscene();return;}
  if(state==='win_cutscene'){drawWinCutscene();return;}
  if(state==='warden_cutscene'){drawWardenCutscene();return;}
  if(state==='dead'){drawDead();return;}
  if(state==='respawn'){drawRespawnCountdown();return;}
  if(state==='win'){drawWin();return;}
  if(state==='conjugal_cutscene'){drawConjugalCutscene();return;}
  if(state==='lickgame'){drawLickGame();return;}
  if(state==='lickresult'){drawLickResult();return;}
  drawGame();
}

// ── MAIN LOOP ──────────────────────────────────────────────
function loop(){
  frameCount++;
  if(window.applyMobileControls)window.applyMobileControls();
  if(state==='cutscene'){
    cutsceneT++;
    if(cutsceneT===45)SFX.slurp();
    if(cutsceneT>=cutsceneDur){startLevel();}
  } else if(state==='bust_cutscene'){
    bustCutsceneT++;
    if(bustCutsceneT>=bustCutsceneDur){
      if(bustIsGameOver){state='dead';setTimeout(()=>{if(state==='dead')startTitleMusic();},800);}
      else{state='respawn';respawnT=0;}
    }
  } else if(state==='win_cutscene'){
    winCutsceneT++;
    if(winCutsceneT===1)startWinMusic();
    if(winCutsceneT>=winCutsceneDur){stopWinMusic();level=1;lives=3;score=0;state='title';startTitleMusic();}
  } else if(state==='warden_cutscene'){
    wardenCutsceneT++;
    if(wardenCutsceneT>=wardenCutsceneDur){state='lickgame';}
  } else {
    update();
  }
  draw();
  requestAnimationFrame(loop);
}
loop();

// Start title music immediately; browsers may suspend AudioContext until a
// gesture, so we also attach a one-time unlock listener as a fallback.
initAudio();
startTitleMusic();
if(audioCtx&&audioCtx.state==='suspended'){
  const _unlock=()=>{
    audioCtx.resume().then(()=>{if(!titleMusicPlaying)startTitleMusic();});
    document.removeEventListener('pointerdown',_unlock);
    document.removeEventListener('keydown',_unlock);
  };
  document.addEventListener('pointerdown',_unlock,{once:true});
  document.addEventListener('keydown',_unlock,{once:true});
}
</script>
